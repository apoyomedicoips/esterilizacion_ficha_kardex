{% extends 'base.html' %}
{% block content %}
<section class="card">
  <h2>Auditoria</h2>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Fecha</th><th>Usuario</th><th>Accion</th><th>Entidad</th><th>ID</th><th>Detalle</th></tr></thead>
      <tbody>
      {% for l in logs %}
      <tr>
        <td>{{ l.created_at }}</td>
        <td>{{ l.username }}</td>
        <td>{{ l.action }}</td>
        <td>{{ l.entity }}</td>
        <td>{{ l.entity_id }}</td>
        <td>{{ l.details }}</td>
      </tr>
      {% endfor %}
      </tbody>
    </table>
  </div>
</section>
{% endblock %}
