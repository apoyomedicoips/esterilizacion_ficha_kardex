{% extends 'base.html' %}
{% block content %}
<section class="card">
  <h2>Servicios</h2>
  <form method="post" class="inline-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
    <label>Nombre del servicio</label>
    <input type="text" name="service_name" maxlength="120" required />
    <button type="submit">Crear servicio</button>
  </form>

  <div class="table-wrap">
    <table>
      <thead><tr><th>Servicio</th><th>Activo</th><th>Creado</th></tr></thead>
      <tbody>
      {% for s in services %}
      <tr><td>{{ s.service_name }}</td><td>{{ s.active }}</td><td>{{ s.created_at }}</td></tr>
      {% endfor %}
      </tbody>
    </table>
  </div>
</section>
{% endblock %}
