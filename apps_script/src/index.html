<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Kardex Enfermeria</title>
  <style>
    :root {
      --bg: #f3f8f9;
      --bg-2: #e8f1f4;
      --card: #ffffff;
      --line: #d6e2e6;
      --text: #0f2127;
      --muted: #4d666e;
      --brand: #0b5f6d;
      --brand-2: #147a8c;
      --ok: #0c6a39;
      --err: #992a2a;
      --warn: #7d5a00;
      --entry: #0a7a55;
      --exit: #a23a1d;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      font-family: "Segoe UI", Tahoma, sans-serif;
      background:
        radial-gradient(circle at 10% 0%, #f6fbfc 0%, transparent 34%),
        linear-gradient(145deg, var(--bg) 0%, var(--bg-2) 100%);
    }

    .top {
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid #1d6a78;
      background: linear-gradient(120deg, #0a4852 0%, #0e5a67 70%, #137184 100%);
      color: #fff;
      padding: 14px 16px 12px;
      box-shadow: 0 4px 16px rgba(9, 52, 60, 0.25);
    }

    .top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .title {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .subtitle {
      margin: 4px 0 0;
      opacity: 0.93;
      font-size: 0.87rem;
    }

    .user-pill {
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 999px;
      font-size: 0.84rem;
      padding: 6px 10px;
      white-space: nowrap;
    }

    .menu {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .menu button {
      border: 1px solid rgba(255, 255, 255, 0.35);
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      border-radius: 999px;
      padding: 9px 14px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
    }

    .menu button.active { background: #fff; color: #0b5661; }
    .menu button:hover { filter: brightness(1.08); }

    main {
      max-width: 1320px;
      margin: 0 auto;
      padding: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 14px;
      box-shadow: 0 6px 16px rgba(14, 60, 70, 0.06);
    }

    .narrow { max-width: 460px; margin: 28px auto; }

    h2 {
      margin: 0 0 10px;
      font-size: 1.18rem;
      line-height: 1.2;
    }

    .help {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .steps {
      display: grid;
      grid-template-columns: repeat(3, minmax(180px, 1fr));
      gap: 10px;
      margin-bottom: 8px;
    }

    .step {
      border: 1px dashed #bad0d7;
      border-radius: 10px;
      background: #f7fcfd;
      padding: 8px 10px;
      font-size: 0.88rem;
      color: #33525c;
    }

    .step b { color: #124a57; }

    label {
      display: block;
      margin-top: 10px;
      font-weight: 700;
      font-size: 0.91rem;
    }

    input, select, textarea, button {
      width: 100%;
      margin-top: 4px;
      border: 1px solid #c8d9de;
      border-radius: 10px;
      padding: 11px 12px;
      font-size: 0.95rem;
      background: #fff;
      color: var(--text);
    }

    textarea { min-height: 84px; resize: vertical; }

    button {
      border: none;
      background: var(--brand);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      transition: transform .05s ease, filter .15s ease;
    }

    button:hover { filter: brightness(1.06); }
    button:active { transform: translateY(1px); }

    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn-row button { width: auto; }
    .inline {
      display: grid;
      grid-template-columns: repeat(3, minmax(180px, 1fr));
      gap: 10px;
      align-items: end;
      margin-bottom: 8px;
    }
    .inline button { width: auto; min-width: 180px; }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(130px, 1fr));
      gap: 10px;
      margin-bottom: 10px;
    }

    .kpi {
      border: 1px solid #cee0e5;
      border-radius: 12px;
      background: linear-gradient(150deg, #ffffff 0%, #f4fafb 100%);
      padding: 10px;
    }

    .kpi .k-label { color: #4a6670; font-size: 0.82rem; margin: 0; }
    .kpi .k-value { font-size: 1.2rem; margin: 4px 0 0; font-weight: 800; color: #0f4d59; }
    .kpi.emph {
      background: linear-gradient(135deg, #0f6473 0%, #17859a 100%);
      color: #fff;
      border: none;
    }
    .kpi.emph .k-label { color: rgba(255,255,255,0.86); }
    .kpi.emph .k-value { color: #fff; }

    .insights {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 8px 0 12px;
    }
    .insight-chip {
      border: 1px solid #c8dde3;
      background: #f4fafc;
      color: #2d5460;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.82rem;
      font-weight: 700;
    }
    .insight-chip.alert {
      border-color: #efbeb0;
      background: #fff1ec;
      color: #8d351f;
    }
    .insight-chip.good {
      border-color: #b8dec6;
      background: #ebf8f0;
      color: #0d6b3c;
    }

    .analytics-grid {
      margin-top: 10px;
      display: grid;
      grid-template-columns: repeat(2, minmax(280px, 1fr));
      gap: 10px;
    }
    .chart-card {
      border: 1px solid #d1e2e7;
      border-radius: 12px;
      padding: 10px;
      background: linear-gradient(160deg, #ffffff 0%, #f6fbfd 100%);
      min-height: 290px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.6);
    }
    .chart-title {
      margin: 0 0 8px;
      font-size: 0.92rem;
      color: #174f5b;
      font-weight: 800;
      letter-spacing: .2px;
    }
    .chart-wrap {
      position: relative;
      height: 240px;
    }
    .semaforo-box {
      margin-top: 12px;
      border: 1px solid #d2e2e7;
      border-radius: 12px;
      padding: 10px;
      background: linear-gradient(160deg,#ffffff 0%,#f7fbfd 100%);
    }
    .semaforo-head {
      display: flex;
      gap: 10px;
      align-items: end;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .semaforo-head .field { min-width: 140px; }
    .semaforo-head input { max-width: 130px; }
    .semaforo-kpis {
      display: grid;
      grid-template-columns: repeat(3, minmax(120px, 1fr));
      gap: 8px;
      margin: 8px 0 10px;
    }
    .traffic {
      border-radius: 10px;
      padding: 8px 10px;
      border: 1px solid transparent;
      font-weight: 800;
      font-size: 0.9rem;
    }
    .traffic.red { background: #ffeceb; border-color: #f2b6b0; color: #9e2f28; }
    .traffic.yellow { background: #fff9e8; border-color: #f3df9e; color: #7f610b; }
    .traffic.green { background: #ecf8ef; border-color: #bee1c7; color: #1d6f3e; }
    .semaforo-pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .pill {
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.8rem;
      font-weight: 700;
      border: 1px solid #cddfe5;
      background: #f8fcfd;
      color: #335861;
    }
    .badge {
      display: inline-block;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 800;
      padding: 3px 8px;
      border: 1px solid transparent;
    }
    .badge.red { background:#ffeceb; color:#9e2f28; border-color:#efb9b3; }
    .badge.yellow { background:#fff9e8; color:#7f610b; border-color:#efdca0; }
    .badge.green { background:#ecf8ef; color:#1d6f3e; border-color:#bfdcc8; }
    .select-box {
      border: 1px solid #d1e2e7;
      border-radius: 12px;
      padding: 10px;
      background: linear-gradient(160deg,#ffffff 0%,#f7fbfd 100%);
      margin-top: 10px;
    }
    .select-title {
      margin: 0 0 6px;
      color: #164c58;
      font-size: 0.95rem;
      font-weight: 800;
    }
    .service-box {
      margin-top: 12px;
      border: 1px solid #d2e2e7;
      border-radius: 12px;
      padding: 10px;
      background: linear-gradient(160deg,#ffffff 0%,#f7fbfd 100%);
    }
    .manager-box {
      margin-top: 12px;
      border: 1px solid #d2e2e7;
      border-radius: 12px;
      padding: 10px;
      background: linear-gradient(160deg,#ffffff 0%,#f7fbfd 100%);
    }
    .manager-kpis {
      display: grid;
      grid-template-columns: repeat(4, minmax(150px, 1fr));
      gap: 8px;
      margin: 8px 0 10px;
    }
    .manager-kpi {
      border: 1px solid #d4e3e8;
      border-radius: 10px;
      padding: 9px 10px;
      background: #fbfeff;
    }
    .manager-kpi p { margin: 0; }
    .manager-kpi .label {
      color: #3e616b;
      font-size: 0.8rem;
      font-weight: 700;
    }
    .manager-kpi .value {
      margin-top: 3px;
      font-size: 1.08rem;
      font-weight: 800;
      color: #0f4f5c;
    }
    .item-sheet-card {
      margin-top: 12px;
      border: 1px solid #d2e2e7;
      border-radius: 12px;
      padding: 10px;
      background: linear-gradient(160deg,#ffffff 0%,#f7fbfd 100%);
    }
    .item-sheet-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 8px;
    }
    .item-sheet-kpis {
      display: grid;
      grid-template-columns: repeat(4, minmax(130px, 1fr));
      gap: 8px;
      margin-bottom: 8px;
    }
    .movement-shell {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 12px;
      margin-top: 8px;
    }
    .movement-content {
      --item-accent: #4f8a98;
      --item-soft: #eef8fb;
      border: 1px solid #d2e2e7;
      border-radius: 12px;
      padding: 10px;
      background:
        linear-gradient(165deg, rgba(255,255,255,0.98) 0%, var(--item-soft) 100%);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.7);
      transition: background .25s ease, border-color .25s ease, box-shadow .25s ease;
    }
    .movement-shell.mode-in .movement-content {
      border-color: #a5d6c0;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.75), 0 6px 16px rgba(12,106,57,0.08);
    }
    .movement-shell.mode-out .movement-content {
      border-color: #efc6b8;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.75), 0 6px 16px rgba(153,42,42,0.08);
    }
    .movement-left {
      border: 1px solid #d2e2e7;
      border-radius: 12px;
      background: linear-gradient(170deg, #ffffff 0%, #f5fbfd 100%);
      padding: 10px;
      max-height: 74vh;
      overflow: auto;
    }
    .movement-left h3 {
      margin: 0;
      color: #174f5b;
      font-size: 0.93rem;
    }
    .movement-left p {
      margin: 4px 0 8px;
      color: #4e6971;
      font-size: 0.82rem;
    }
    .movement-item-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .movement-item {
      width: 100%;
      text-align: left;
      border: 1px solid #cddfe5;
      border-left: 8px solid #5f8a98;
      border-radius: 10px;
      background: #f5fafc;
      color: #204f5c;
      padding: 8px 9px;
      cursor: pointer;
      transition: transform .05s ease, box-shadow .15s ease, filter .15s ease;
    }
    .movement-item.active {
      box-shadow: 0 0 0 2px rgba(16, 88, 100, 0.15) inset;
      border-color: #8cb9c5;
      background: #eef8fb;
    }
    .movement-item:hover { filter: brightness(0.99); }
    .movement-item .main {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 0.86rem;
      font-weight: 800;
    }
    .movement-item .sub {
      margin-top: 2px;
      font-size: 0.78rem;
      opacity: 0.92;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 1fr));
      gap: 12px;
      align-items: start;
    }

    .grid button.save {
      grid-column: 1 / -1;
      max-width: 280px;
      font-size: 1rem;
      padding: 12px;
    }

    .move-type {
      display: grid;
      grid-template-columns: repeat(2, minmax(160px, 1fr));
      gap: 10px;
      margin-top: 6px;
    }

    .type-btn {
      border-radius: 12px;
      border: 1px solid #c8d9de;
      padding: 12px;
      font-size: 0.94rem;
      background: #fff;
      color: #184a55;
      font-weight: 700;
    }

    .type-btn.active.entry { background: #eaf8f2; border-color: #9fd3bc; color: var(--entry); }
    .type-btn.active.exit { background: #fff1ec; border-color: #efbeac; color: var(--exit); }

    .note {
      border-left: 4px solid #97bac5;
      background: #f5fafb;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 0.88rem;
      color: #385864;
      margin-top: 10px;
    }
    .movement-shell.mode-in .note {
      border-left-color: #2f9e70;
      background: #ebf8f0;
      color: #0f5d36;
    }
    .movement-shell.mode-out .note {
      border-left-color: #d9654b;
      background: #fff1ec;
      color: #7e2f1a;
    }

    .table {
      overflow: auto;
      border: 1px solid #d5e3e8;
      border-radius: 10px;
      background: #fff;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 0.88rem;
    }

    th, td {
      border: 1px solid #dfebef;
      padding: 7px 8px;
      white-space: nowrap;
      text-align: left;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #ecf6f8;
      color: #114652;
      font-size: 0.83rem;
    }

    td strong { color: #083d47; }

    .chip {
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 0.78rem;
      font-weight: 700;
      display: inline-block;
    }

    .chip.in { background: #e8f8ef; color: #0d6f3d; border: 1px solid #b4dfc4; }
    .chip.out { background: #fff0ea; color: #963b22; border: 1px solid #f0c6b8; }

    .msg {
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 10px;
      font-weight: 700;
      font-size: 0.92rem;
    }

    .msg.ok { background: #e7f8ed; color: var(--ok); border: 1px solid #c2e7ce; }
    .msg.err { background: #ffeded; color: var(--err); border: 1px solid #f0c2c2; }
    .hidden { display: none; }

    .loader {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(7, 35, 41, 0.28);
      z-index: 99;
      backdrop-filter: blur(2px);
    }

    .loader-card {
      background: #fff;
      border: 1px solid #cfdfe4;
      border-radius: 12px;
      padding: 14px 18px;
      font-weight: 700;
      color: #0f4c57;
      box-shadow: 0 10px 25px rgba(7, 35, 41, 0.2);
    }

    .small { font-size: 0.83rem; color: var(--muted); }

    @media (max-width: 980px) {
      .inline { grid-template-columns: 1fr; }
      .grid { grid-template-columns: 1fr; }
      .move-type { grid-template-columns: 1fr; }
      .summary { grid-template-columns: repeat(2, minmax(130px, 1fr)); }
      .steps { grid-template-columns: 1fr; }
      .analytics-grid { grid-template-columns: 1fr; }
      .manager-kpis { grid-template-columns: repeat(2, minmax(130px, 1fr)); }
      .item-sheet-kpis { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
      .movement-shell { grid-template-columns: 1fr; }
      .movement-left { max-height: none; }
      main { padding: 12px; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
</head>
<body>
  <header class="top">
    <div class="top-row">
      <div>
        <h1 class="title">Kardex de Esterilizacion</h1>
        <p class="subtitle">Registro diario de insumos para enfermeria</p>
      </div>
      <div id="userLabel" class="user-pill"></div>
    </div>
    <nav id="menu" class="menu hidden"></nav>
  </header>

  <main id="app"></main>

  <div id="loader" class="loader">
    <div class="loader-card">Cargando, por favor espere...</div>
  </div>

<script>
const state = {
  token: localStorage.getItem('kardex_token') || '',
  user: null,
  bootstrap: null,
  dashboard: null,
  dashboardRaw: null,
  selectedItems: null,
  selectedSheetItem: localStorage.getItem('kardex_selected_item') || '',
  cutoffDay: Number(localStorage.getItem('kardex_cutoff_day') || 0),
  currentView: 'dashboard',
  movementType: 'OUT',
  charts: [],
  closureRaw: null,
  semaforo: {
    rojo: Number(localStorage.getItem('kardex_sem_rojo') || 50),
    amarillo: Number(localStorage.getItem('kardex_sem_amarillo') || 150)
  },
  semaforoArea: {
    amarillo: Number(localStorage.getItem('kardex_area_amarillo') || 120),
    rojo: Number(localStorage.getItem('kardex_area_rojo') || 280)
  }
};

const VIEW_LABELS = {
  dashboard: 'Tablero',
  closure: 'Cierre mensual',
  movements: 'Registrar movimiento',
  items: 'Catalogo de items',
  services: 'Catalogo de servicios',
  audit: 'Auditoria'
};

function setLoading(on) {
  document.getElementById('loader').style.display = on ? 'flex' : 'none';
}

function showMsg(text, ok=false){
  const el=document.createElement('div');
  el.className='msg '+(ok?'ok':'err');
  el.textContent=text;
  const app=document.getElementById('app');
  app.prepend(el);
  setTimeout(()=>el.remove(),6500);
}

function runServer(fn, payload){
  return new Promise((resolve,reject)=>{
    google.script.run
      .withSuccessHandler(resolve)
      .withFailureHandler(err=>reject(err && err.message ? err.message : String(err)))
      [fn](payload);
  });
}

async function safeServer(fn, payload){
  setLoading(true);
  try { return await runServer(fn, payload); }
  finally { setLoading(false); }
}

function roleName(role){
  if(role==='admin') return 'Administracion';
  if(role==='operator') return 'Operador/a';
  return 'Consulta';
}

function render(){
  if(!state.token){ renderLogin(); return; }
  renderShell();
  if(state.currentView==='dashboard') renderDashboard();
  if(state.currentView==='closure') renderClosure();
  if(state.currentView==='movements') renderMovements();
  if(state.currentView==='items') renderItems();
  if(state.currentView==='services') renderServices();
  if(state.currentView==='audit') renderAudit();
}

function renderLogin(){
  document.getElementById('menu').classList.add('hidden');
  document.getElementById('userLabel').textContent='No autenticado';

  const app=document.getElementById('app');
  app.innerHTML=`
    <section class="card narrow">
      <h2>Bienvenida/o</h2>
      <p class="help">Ingrese su usuario y contrasena para comenzar.</p>
      <label>Usuario</label>
      <input id="u" type="text" autocomplete="username" placeholder="Ejemplo: user"/>

      <label>Contrasena</label>
      <input id="p" type="password" autocomplete="current-password" placeholder="Ingrese su contrasena"/>

      <div class="btn-row" style="margin-top:12px">
        <button id="b">Entrar al sistema</button>
      </div>
      <p class="small">Version <?= appVersion ?></p>
    </section>`;

  document.getElementById('u').focus();
  document.getElementById('p').addEventListener('keydown', (e)=>{ if(e.key==='Enter') document.getElementById('b').click(); });

  document.getElementById('b').onclick=async()=>{
    try{
      const username=document.getElementById('u').value.trim();
      const password=document.getElementById('p').value;
      if(!username || !password){ showMsg('Complete usuario y contrasena.'); return; }

      const out=await safeServer('login',{username,password});
      state.token=out.token;
      localStorage.setItem('kardex_token',state.token);
      state.user=out.user;
      await loadBootstrap();
      state.currentView='dashboard';
      render();
      showMsg('Ingreso correcto. Bienvenida/o.', true);
    }catch(e){ showMsg(e); }
  };
}

async function loadBootstrap(){
  const out=await safeServer('getBootstrap',state.token);
  state.bootstrap=out;
  state.user=out.user;
}

function renderShell(){
  document.getElementById('userLabel').textContent = state.user ? `${state.user.username} · ${roleName(state.user.role)}` : '';

  const menu=document.getElementById('menu');
  menu.classList.remove('hidden');
  menu.innerHTML='';

  const canWrite=state.user && (state.user.role==='admin' || state.user.role==='operator');
  const isAdmin=state.user && state.user.role==='admin';

function pad2(n){ return String(Number(n||0)).padStart(2,'0'); }

function parseCutoffLabelParts(label){
  const s=String(label||'');
  const m=s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(!m) return { year:'-', month:'-', day:'-' };
  return { year:m[1], month:String(Number(m[2])), day:String(Number(m[3])) };
}

function getClosureData(raw){
  if(!raw) return null;
  const model=buildCutoffModel(raw);
  const rows=((model && model.rows) || []).map(r=>({
    item_code: r.item_code,
    item_name: r.item_name,
    stock_inicial: Number(r.start_balance||0),
    entradas: Number(r.in_until||0),
    salidas: Number(r.out_until||0),
    saldo_final: Number(r.cutoff_balance||0)
  }));
  rows.sort((a,b)=>{
    const an=Number(a.item_code), bn=Number(b.item_code);
    const aNum=Number.isFinite(an) && String(a.item_code).trim()!=='';
    const bNum=Number.isFinite(bn) && String(b.item_code).trim()!=='';
    if(aNum && bNum) return an-bn;
    if(aNum) return -1;
    if(bNum) return 1;
    return String(a.item_code).localeCompare(String(b.item_code));
  });
  const totals=rows.reduce((acc,r)=>{
    acc.stock_inicial += r.stock_inicial;
    acc.entradas += r.entradas;
    acc.salidas += r.salidas;
    acc.saldo_final += r.saldo_final;
    return acc;
  },{stock_inicial:0,entradas:0,salidas:0,saldo_final:0});
  return { model, rows, totals };
}

function downloadBlob(filename, mimeType, content){
  const blob=new Blob([content], {type:mimeType});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function getFilteredDashboardOut(raw){

  if(!state.selectedItems || state.selectedItems.size===0) return raw;
  const keep=state.selectedItems;
  const rows=(raw.rows||[]).filter(r=>keep.has(String(r.item_code)));
  const mm=(raw.month_movements||[]).filter(m=>keep.has(String(m.item_code)));
  return Object.assign({}, raw, { rows: rows, month_movements: mm });
}

function syncCutoffSelector(days, targetId){
  const sel=document.getElementById(targetId || 'cutoffDay');
  if(!sel || !days || !days.length) return;
  const maxDay=Math.max(...days.map(d=>Number(d||0)));
  let desired=Number(state.cutoffDay||0);
  if(!desired || desired<1 || desired>maxDay) desired=maxDay;
  state.cutoffDay=desired;
  localStorage.setItem('kardex_cutoff_day', String(desired));
  sel.innerHTML=days.map(d=>{
    const n=Number(d||0);
    const tag = n===maxDay ? ' (fin de mes)' : '';
    return `<option value="${n}">Dia ${n}${tag}</option>`;
  }).join('');
  sel.value=String(desired);
}

function buildCutoffModel(out){
  const rows=(out && out.rows) || [];
  const days=(out && out.days) || [];
  const mm=(out && out.month_movements) || [];
  if(!days.length){
    return { cutoffDay: 0, cutoffIndex: 0, rows: [], serviceRows: [], totalByDay: [], cumulativeIn: [], cumulativeOut: [] };
  }

  const maxDay=Math.max(...days.map(d=>Number(d||0)));
  let cutoffDay=Number(state.cutoffDay||maxDay);
  if(!cutoffDay || cutoffDay<1 || cutoffDay>maxDay) cutoffDay=maxDay;
  const cutoffIndex=Math.max(0, cutoffDay-1);
  const itemAgg={};
  const serviceAgg={};
  let totalOutUntil=0;
  let totalInUntil=0;

  mm.forEach(m=>{
    const day=Number(m.day||0);
    if(!day || day>cutoffDay) return;
    const code=String(m.item_code||'');
    const svc=String(m.service_name||'').trim().toUpperCase();
    const qty=Number(m.quantity||0);
    const type=String(m.move_type||'').toUpperCase();
    if(!code || !qty) return;
    if(!itemAgg[code]) itemAgg[code]={in_qty:0,out_qty:0};
    if(type==='IN'){
      itemAgg[code].in_qty += qty;
      totalInUntil += qty;
    }else if(type==='OUT'){
      itemAgg[code].out_qty += qty;
      totalOutUntil += qty;
      if(svc){
        if(!serviceAgg[svc]) serviceAgg[svc]=0;
        serviceAgg[svc] += qty;
      }
    }
  });

  const cutoffRows=rows.map(r=>{
    const code=String(r.item_code||'');
    const start=Number(r.start_balance||0);
    const end=Number(r.end_balance||0);
    const cut=Number(r.day_values?.[cutoffIndex] ?? end);
    const agg=itemAgg[code] || {in_qty:0,out_qty:0};
    const dailyOutRate = cutoffDay>0 ? agg.out_qty / cutoffDay : 0;
    let coverageDays = null;
    if(dailyOutRate > 0) coverageDays = cut / dailyOutRate;
    let coverageLevel='green';
    let coverageText='Estable';
    if(cut<=0){
      coverageLevel='red'; coverageText='Sin stock';
    }else if(coverageDays != null && coverageDays < 3){
      coverageLevel='red'; coverageText='Critico (<3 dias)';
    }else if(coverageDays != null && coverageDays < 7){
      coverageLevel='yellow'; coverageText='Alerta (3-7 dias)';
    }else if(coverageDays == null){
      coverageText='Sin consumo';
    }
    return {
      item_code: code,
      item_name: r.item_name,
      start_balance: start,
      end_balance: end,
      cutoff_balance: cut,
      cutoff_diff: cut-start,
      in_until: agg.in_qty,
      out_until: agg.out_qty,
      daily_out_rate: dailyOutRate,
      coverage_days: coverageDays,
      coverage_level: coverageLevel,
      coverage_text: coverageText,
      day_values: r.day_values || []
    };
  });

  const serviceRows = Object.keys(serviceAgg)
    .map(name=>({ service_name:name, out_qty:Number(serviceAgg[name]||0) }))
    .sort((a,b)=>b.out_qty-a.out_qty);

  const totalByDay=days.map((_,idx)=>cutoffRows.reduce((acc,r)=>acc+Number(r.day_values[idx]||0),0));
  const dayIn={};
  const dayOut={};
  mm.forEach(m=>{
    const d=Number(m.day||0);
    if(!d) return;
    const q=Number(m.quantity||0);
    const t=String(m.move_type||'').toUpperCase();
    if(t==='IN') dayIn[d]=(dayIn[d]||0)+q;
    if(t==='OUT') dayOut[d]=(dayOut[d]||0)+q;
  });
  const cumulativeIn=[];
  const cumulativeOut=[];
  let runIn=0;
  let runOut=0;
  for(let d=1; d<=days.length; d++){
    runIn += Number(dayIn[d]||0);
    runOut += Number(dayOut[d]||0);
    cumulativeIn.push(d<=cutoffDay ? runIn : null);
    cumulativeOut.push(d<=cutoffDay ? runOut : null);
  }

  return {
    cutoffDay,
    cutoffIndex,
    cutoffLabel: `${out.month}-${pad2(cutoffDay)}`,
    rows: cutoffRows,
    serviceRows,
    totalByDay,
    cumulativeIn,
    cumulativeOut,
    totalOutUntil,
    totalInUntil,
    monthDays: days.length
  };
}

function renderLassoSelector(raw){
  const container=document.getElementById('lassoPlot');
  if(!container || typeof Plotly==='undefined' || !raw) return;
  const model=buildCutoffModel(raw);
  const rows=model.rows||[];
  const x=rows.map(r=>Number(r.cutoff_balance||0));
  const y=rows.map(r=>Number(r.cutoff_diff||0));
  const labels=rows.map(r=>String(r.item_code));
  const selected=state.selectedItems || new Set();
  const colors=labels.map(l=>selected.has(l)?'#e66f51':'#1c89a0');

  const trace={
    x:x, y:y, text:labels, mode:'markers+text', type:'scatter',
    textposition:'top center',
    marker:{ size:10, color:colors, line:{color:'#ffffff', width:1} },
    hovertemplate:'Item %{text}<br>Stock corte: %{x}<br>Variacion corte: %{y}<extra></extra>'
  };
  const layout={
    margin:{l:45,r:15,t:10,b:40},
    paper_bgcolor:'rgba(0,0,0,0)',
    plot_bgcolor:'#ffffff',
    dragmode:'lasso',
    xaxis:{title:'Stock a fecha de corte'},
    yaxis:{title:'Variacion al corte'}
  };
  Plotly.react(container,[trace],layout,{displayModeBar:true,responsive:true,modeBarButtonsToRemove:['autoScale2d','lasso2d','select2d'],displaylogo:false});
  container.on('plotly_selected',(ev)=>{
    if(!ev || !ev.points || ev.points.length===0){ return; }
    const set=new Set(ev.points.map(p=>String(labels[p.pointIndex])));
    state.selectedItems=set;
    renderDashboardPanels();
  });
  container.on('plotly_deselect',()=>{
    state.selectedItems=null;
    renderDashboardPanels();
  });
}

function destroyDashboardCharts(){
  if(!state.charts) state.charts=[];
  state.charts.forEach(ch=>{ try{ ch.destroy(); }catch(_e){} });
  state.charts=[];
}

function colorRamp(i){
  const palette=['#0b5f6d','#1d8091','#2c9bb0','#62b8c8','#97d3dc','#f39a6b','#e66f51','#c44a3f','#7fb069','#4f8f5f','#8b7bd1','#aa8bd7'];
  return palette[i%palette.length];
}

function buildDashboardAnalytics(out, model){
  const rows=(model && model.rows) || [];
  const days=(out && out.days) || [];
  const totalByDay=(model && model.totalByDay) || [];
  const serviceTop=((model && model.serviceRows) || []).slice(0,10);
  const topItems=[...rows]
    .sort((a,b)=>Number(b.out_until||0)-Number(a.out_until||0))
    .slice(0,12)
    .map(r=>({
      code:r.item_code,
      start:Number(r.start_balance||0),
      ins:Number(r.in_until||0),
      outs:Number(r.out_until||0),
      end:Number(r.cutoff_balance||0)
    }));
  return {days,totalByDay,serviceTop,topItems};
}

function ensureSelectedSheetItem(model){
  const rows=(model && model.rows) || [];
  if(!rows.length){ state.selectedSheetItem=''; return; }
  const exists=rows.some(r=>String(r.item_code)===String(state.selectedSheetItem||''));
  if(exists) return;
  const critical=[...rows].sort((a,b)=>
    Number(a.coverage_days||99999)-Number(b.coverage_days||99999) ||
    Number(a.cutoff_balance||0)-Number(b.cutoff_balance||0)
  )[0];
  state.selectedSheetItem=String((critical && critical.item_code) || rows[0].item_code || '');
  localStorage.setItem('kardex_selected_item', state.selectedSheetItem);
}

function getSelectedItemModel(out, model){
  const rows=(model && model.rows) || [];
  const selected=rows.find(r=>String(r.item_code)===String(state.selectedSheetItem||'')) || rows[0];
  if(!selected) return null;
  const days=(out && out.days) || [];
  const mm=(out && out.month_movements) || [];
  const dayIn={};
  const dayOut={};
  mm.forEach(m=>{
    if(String(m.item_code)!==String(selected.item_code)) return;
    const d=Number(m.day||0);
    if(!d) return;
    const q=Number(m.quantity||0);
    const t=String(m.move_type||'').toUpperCase();
    if(t==='IN') dayIn[d]=(dayIn[d]||0)+q;
    if(t==='OUT') dayOut[d]=(dayOut[d]||0)+q;
  });
  const inSeries=days.map(d=>Number(dayIn[Number(d)]||0));
  const outSeries=days.map(d=>Number(dayOut[Number(d)]||0));
  return {
    row: selected,
    labels: days.map(d=>String(d)),
    stockSeries: (selected.day_values||[]).map(v=>Number(v||0)),
    inSeries,
    outSeries
  };
}

function semaforoLevel(v, rojo, amarillo){
  const n=Number(v||0);
  if(n<=rojo) return 'red';
  if(n<=amarillo) return 'yellow';
  return 'green';
}

function semaforoLabel(level){
  if(level==='red') return 'Rojo';
  if(level==='yellow') return 'Amarillo';
  return 'Verde';
}

function calcKpis(out, model){
  const rows=(model && model.rows) || [];
  let totalInicio=0;
  let stockCorte=0;
  let criticos=0;
  rows.forEach(r=>{
    totalInicio += Number(r.start_balance||0);
    stockCorte += Number(r.cutoff_balance||0);
    if(Number(r.cutoff_balance||0) <= 0) criticos++;
  });
  const cutoffDay = Number((model && model.cutoffDay) || 1);
  const monthDays = Number((model && model.monthDays) || cutoffDay);
  const consumoAcum = Number((model && model.totalOutUntil) || 0);
  const runRate = cutoffDay>0 ? consumoAcum / cutoffDay : 0;
  const consumoProyectado = runRate * monthDays;
  const stockProyectado = stockCorte - runRate * Math.max(0, monthDays-cutoffDay);
  const coberturaCritica = rows.filter(r=>r.coverage_level==='red').length;
  return {
    items: rows.length,
    inicio: totalInicio,
    corte: stockCorte,
    criticos,
    variacion: stockCorte-totalInicio,
    consumoAcum,
    runRate,
    consumoProyectado,
    stockProyectado,
    coberturaCritica
  };
}

function renderSemaforo(model){
  const rojo=Number(state.semaforo.rojo||0);
  const amarillo=Number(state.semaforo.amarillo||0);
  const rows=((model && model.rows) || []).map(r=>{
    const cut=Number(r.cutoff_balance||0);
    const start=Number(r.start_balance||0);
    const diff=Number(r.cutoff_diff||0);
    const level=semaforoLevel(cut,rojo,amarillo);
    return { code:r.item_code, name:r.item_name, cut, start, diff, level };
  });

  const order={'red':0,'yellow':1,'green':2};
  rows.sort((a,b)=> order[a.level]-order[b.level] || a.cut-b.cut || String(a.code).localeCompare(String(b.code)));

  const countRed=rows.filter(r=>r.level==='red').length;
  const countYellow=rows.filter(r=>r.level==='yellow').length;
  const countGreen=rows.filter(r=>r.level==='green').length;
  const avgEnd=rows.length ? rows.reduce((a,r)=>a+r.cut,0)/rows.length : 0;

  document.getElementById('semKpis').innerHTML=`
    <div class="traffic red">Rojo: ${countRed}</div>
    <div class="traffic yellow">Amarillo: ${countYellow}</div>
    <div class="traffic green">Verde: ${countGreen}</div>`;

  const criticalTop=rows.filter(r=>r.level==='red').slice(0,5).map(r=>`${r.code} (${fmt(r.cut)})`);
  document.getElementById('semPills').innerHTML=`
    <span class="pill">Umbrales: rojo ≤ ${fmt(rojo)} | amarillo ≤ ${fmt(amarillo)}</span>
    <span class="pill">Fecha corte: ${(model && model.cutoffLabel) || '-'}</span>
    <span class="pill">Stock corte promedio: ${fmt(Math.round(avgEnd))}</span>
    ${criticalTop.length?`<span class="pill" style="border-color:#efb9b3;background:#ffeceb;color:#902f27">Criticos: ${criticalTop.join(', ')}</span>`:''}`;

  document.getElementById('semTable').innerHTML=`
    <table>
      <thead>
        <tr>
          <th>Prioridad</th>
          <th>Item</th>
          <th>Descripcion</th>
          <th>Saldo corte</th>
          <th>Variacion al corte</th>
          <th>Estado</th>
        </tr>
      </thead>
      <tbody>
        ${rows.map((r,i)=>`
          <tr>
            <td>${i+1}</td>
            <td><strong>${esc(r.code)}</strong></td>
            <td>${esc(r.name)}</td>
            <td>${fmt(r.cut)}</td>
            <td>${fmt(r.diff)}</td>
            <td><span class="badge ${r.level}">${semaforoLabel(r.level)}</span></td>
          </tr>`).join('')}
      </tbody>
    </table>`;
}

function renderSemaforoArea(model){
  const y=Number(state.semaforoArea.amarillo||0);

    const outq=Number(s.out_qty||0);

    if(outq>=r) level='red'; else if(outq>=y) level='yellow';
    return {service:s.service_name,out_qty:outq,level};
  }).sort((a,b)=>({'red':0,'yellow':1,'green':2}[a.level]-({'red':0,'yellow':1,'green':2}[b.level]) || b.out_qty-a.out_qty));

  const cr=rows.filter(x=>x.level==='red').length;
  const cy=rows.filter(x=>x.level==='yellow').length;
  const cg=rows.filter(x=>x.level==='green').length;

}

    ${criticalCodes.length?`<span class="insight-chip alert">Prioridad compra: ${criticalCodes.join(', ')}</span>`:''}`;

  const order={ red:0, yellow:1, green:2 };

    syncCutoffSelector(out.days||[]);

        <p>Seleccione el item como en las hojas del Excel.</p>
        <input id="movementItemSearch" type="text" placeholder="Buscar item..." />
        <div id="movementItemList" class="movement-item-list" style="margin-top:8px"></div>
      </aside>

      <div id="movementContent" class="movement-content">
        <div class="steps">
          <div class="step"><b>Paso 1:</b> Seleccione si es entrada o salida.</div>
          <div class="step"><b>Paso 2:</b> Elija item en panel lateral y cargue los datos.</div>
          <div class="step"><b>Paso 3:</b> Presione <b>Guardar movimiento</b>.</div>
        </div>

        <label>Tipo de movimiento</label>
        <div class="move-type">
          <button id="btnOut" class="type-btn exit active">Salida de insumo</button>
          <button id="btnIn" class="type-btn entry">Entrada de insumo</button>
        </div>

        <div class="note" id="moveHelp">Salida: descuenta unidades del stock.</div>
        <div id="movementThemeHint" class="chip" style="margin-top:8px">Item activo</div>

        <div class="grid">
          <div>
            <label>Fecha</label>
            <input id="m_date" type="date" value="${today}"/>
          </div>
          <div>
            <label>Item seleccionado</label>
            <select id="m_item">${items.map(i=>`<option value="${escAttr(i.item_code)}">${esc(i.item_code)} - ${esc(i.item_name)}</option>`).join('')}</select>
          </div>
          <div>
            <label>Servicio</label>
            <input id="m_service_search" type="text" placeholder="Buscar servicio" />
            <select id="m_service">${services.map(s=>`<option value="${escAttr(s.service_name)}">${esc(s.service_name)}</option>`).join('')}</select>
          </div>
          <div>
            <label>Cantidad</label>
            <input id="m_qty" type="number" min="1" placeholder="Ejemplo: 10"/>
            <div class="btn-row" style="margin-top:6px">
              <button type="button" class="quick-qty" data-v="5" style="width:auto;background:#4f7f8e">+5</button>
              <button type="button" class="quick-qty" data-v="10" style="width:auto;background:#4f7f8e">+10</button>
              <button type="button" class="quick-qty" data-v="20" style="width:auto;background:#4f7f8e">+20</button>
              <button type="button" class="quick-qty" data-v="50" style="width:auto;background:#4f7f8e">+50</button>
            </div>
          </div>
          <div>
            <label>Nro. boleta / ticket (opcional)</label>
            <input id="m_ticket" type="text" placeholder="Ejemplo: 1234"/>
          </div>
          <div>
            <label>Nota (opcional)</label>
            <textarea id="m_notes" placeholder="Observaciones"></textarea>
          </div>
          <button id="saveMove" class="save">Guardar movimiento</button>
        </div>
      </div>
    </div>
  </section>`;

  function setType(t){
    state.movementType=t;
    const outBtn=document.getElementById('btnOut');
    const inBtn=document.getElementById('btnIn');
    outBtn.classList.remove('active'); inBtn.classList.remove('active');
    if(t==='OUT') outBtn.classList.add('active');
    if(t==='IN') inBtn.classList.add('active');
    applyMovementVisuals();
  }

  document.getElementById('btnOut').onclick=()=>setType('OUT');
  document.getElementById('btnIn').onclick=()=>setType('IN');
  const itemSelect=document.getElementById('m_item');
  const serviceSelect=document.getElementById('m_service');
  const allServiceOptions=[...serviceSelect.options].map(o=>({value:o.value,text:o.text}));
  const itemMap={};
  items.forEach(i=>{ itemMap[String(i.item_code)] = i; });

  function refillSelect(sel, opts){
    const cur=sel.value;
    sel.innerHTML=opts.map(o=>`<option value="${escAttr(o.value)}">${esc(o.text)}</option>`).join('');
    const has=opts.some(o=>o.value===cur);
    if(has) sel.value=cur;
  }

  function colorFromItemCode(code){
    const PALETTE=[
      {border:'#d83a74', bgSoft:'#feeff5', bgMid:'#fdd8e8', bgStrong:'#fbc1dc'}, // rosa
      {border:'#1f9d5a', bgSoft:'#eafaf1', bgMid:'#cff3df', bgStrong:'#b3ebcd'}, // verde
      {border:'#1f78d1', bgSoft:'#ebf4ff', bgMid:'#d1e6ff', bgStrong:'#b6d7ff'}, // azul
      {border:'#f06a2a', bgSoft:'#fff3eb', bgMid:'#ffe0cd', bgStrong:'#ffceb0'}, // naranja
      {border:'#7c4dff', bgSoft:'#f3efff', bgMid:'#e2d8ff', bgStrong:'#d1c0ff'}, // violeta
      {border:'#009f9d', bgSoft:'#e8fbfb', bgMid:'#c8f3f2', bgStrong:'#a9eceb'}, // turquesa
      {border:'#cc2f52', bgSoft:'#feeff2', bgMid:'#fcd4de', bgStrong:'#f9bacb'}, // frambuesa
      {border:'#4f9a06', bgSoft:'#f2fae9', bgMid:'#e1f2cc', bgStrong:'#cfe9ae'}, // lima
      {border:'#0067c8', bgSoft:'#eaf2ff', bgMid:'#cfe0ff', bgStrong:'#b2ceff'}, // azul fuerte
      {border:'#e07a00', bgSoft:'#fff6ea', bgMid:'#ffe6c4', bgStrong:'#ffd69e'}, // ambar
      {border:'#a83ee6', bgSoft:'#f7efff', bgMid:'#ebd5ff', bgStrong:'#debcff'}, // morado
      {border:'#00a86b', bgSoft:'#e8fbf3', bgMid:'#caf3df', bgStrong:'#acecca'}, // esmeralda
      {border:'#db3f8d', bgSoft:'#feeff7', bgMid:'#fdd6ea', bgStrong:'#fbbddc'}, // fucsia
      {border:'#2d8bba', bgSoft:'#edf7fc', bgMid:'#d4eefa', bgStrong:'#bbe5f8'}, // celeste
      {border:'#ff5b3a', bgSoft:'#fff1ed', bgMid:'#ffd9d0', bgStrong:'#ffc0b4'}, // coral
      {border:'#2aa84a', bgSoft:'#ecfaef', bgMid:'#d3f3dc', bgStrong:'#b9ecc8'}  // verde hoja
    ];
    const s=String(code||'');
    let h=0;
    for(let i=0;i<s.length;i++) h=(h*131 + s.charCodeAt(i)) >>> 0;
    const base=PALETTE[h % PALETTE.length];
    return {
      border:base.border,
      bgSoft:base.bgSoft,
      bgMid:base.bgMid,
      bgStrong:base.bgStrong
    };
  }

  function applyMovementVisuals(){
    const type = state.movementType==='IN' ? 'IN' : 'OUT';
    const shell=document.getElementById('movementShell');
    const content=document.getElementById('movementContent');
    const help=document.getElementById('moveHelp');
    const hint=document.getElementById('movementThemeHint');
    const save=document.getElementById('saveMove');

    if(shell){
      shell.classList.remove('mode-in','mode-out');
      shell.classList.add(type==='IN' ? 'mode-in' : 'mode-out');
    }

    const code=String(itemSelect.value||'');
    const c=colorFromItemCode(code);
    const itemObj=itemMap[code];
    if(content){
      content.style.setProperty('--item-accent', c.border);
      content.style.setProperty('--item-soft', c.bgMid);
      content.style.borderColor = c.border;
      content.style.background = `linear-gradient(165deg, rgba(255,255,255,0.98) 0%, ${c.bgMid} 100%)`;
    }
    if(hint){
      hint.textContent = `Item activo: ${code}${itemObj ? ' - ' + itemObj.item_name : ''}`;
      hint.style.borderColor = c.border;
      hint.style.background = c.bgStrong;
      hint.style.color = '#1f4f5b';
    }
    if(help){
      help.textContent = type==='OUT'
        ? 'Modo SALIDA: descuenta unidades del stock.'
        : 'Modo ENTRADA: suma unidades al stock.';
    }
    if(save){
      save.textContent = type==='OUT' ? 'Registrar salida' : 'Registrar entrada';
      save.style.background = type==='OUT' ? '#a23a1d' : '#0a7a55';
    }
    const fields=[...document.querySelectorAll('#movementContent input, #movementContent select, #movementContent textarea')];
    fields.forEach(el=>{
      el.style.borderColor = c.border;
      el.style.boxShadow = `inset 0 0 0 1px ${c.bgSoft}`;
    });
  }

  function renderMovementItemList(){
    const host=document.getElementById('movementItemList');
    if(!host) return;
    const q=String(document.getElementById('movementItemSearch').value||'').trim().toLowerCase();
    const filtered=items.filter(i=>{
      if(!q) return true;
      const t=`${i.item_code} ${i.item_name}`.toLowerCase();
      return t.includes(q);
    });
    host.innerHTML=filtered.map(i=>{
      const active=String(i.item_code)===String(itemSelect.value);
      const c=colorFromItemCode(i.item_code);
      return `<button class="movement-item ${active?'active':''}" data-code="${escAttr(i.item_code)}" style="border-left-color:${c.border};border-color:${active?c.border:'#cddfe5'};background:${active?c.bgStrong:c.bgSoft}">
        <div class="main"><span>${esc(i.item_code)}</span></div>
        <div class="sub">${esc(i.item_name)}</div>
      </button>`;
    }).join('');
    [...host.querySelectorAll('.movement-item')].forEach(btn=>{
      btn.onclick=()=>{
        const code=String(btn.getAttribute('data-code')||'');
        itemSelect.value=code;
        state.selectedSheetItem=code;
        localStorage.setItem('kardex_selected_item', code);
        renderMovementItemList();
        applyMovementVisuals();
      };
    });
  }

  if(state.selectedSheetItem && itemMap[state.selectedSheetItem]){
    itemSelect.value=state.selectedSheetItem;
  }
  itemSelect.onchange=()=>{
    state.selectedSheetItem=String(itemSelect.value||'');
    localStorage.setItem('kardex_selected_item', state.selectedSheetItem);
    renderMovementItemList();
    applyMovementVisuals();
  };
  document.getElementById('movementItemSearch').oninput=renderMovementItemList;
  renderMovementItemList();
  applyMovementVisuals();

  document.getElementById('m_service_search').addEventListener('input',(e)=>{
    const q=String(e.target.value||'').trim().toLowerCase();
    const filtered=allServiceOptions.filter(o=>o.text.toLowerCase().includes(q));
    refillSelect(serviceSelect, filtered.length?filtered:allServiceOptions);
  });

  [...document.querySelectorAll('.quick-qty')].forEach(b=>{
    b.onclick=()=>{
      const add=Number(b.getAttribute('data-v')||0);
      const qty=document.getElementById('m_qty');
      qty.value=String((Number(qty.value||0)+add)||add);
      qty.focus();
    };
  });

  document.getElementById('saveMove').onclick=async()=>{
    try{
      const payload={
        token:state.token,
        movement_date:document.getElementById('m_date').value,
        item_code:document.getElementById('m_item').value,
        service_name:document.getElementById('m_service').value,
        move_type:state.movementType,
        quantity:Number(document.getElementById('m_qty').value||0),
        ticket_no:document.getElementById('m_ticket').value,
        notes:document.getElementById('m_notes').value
      };

      if(!payload.movement_date){ showMsg('Seleccione la fecha.'); return; }
      if(!payload.item_code){ showMsg('Seleccione un item.'); return; }
      if(!payload.service_name){ showMsg('Seleccione un servicio.'); return; }
      if(!payload.quantity || payload.quantity<=0){ showMsg('Ingrese una cantidad valida.'); return; }

      await safeServer('createMovement',payload);
      showMsg('Movimiento guardado correctamente.',true);

      document.getElementById('m_qty').value='';
      document.getElementById('m_ticket').value='';
      document.getElementById('m_notes').value='';
      document.getElementById('m_qty').focus();
    }catch(e){ showMsg(e); }
  };
}

function renderItems(){
  const app=document.getElementById('app');
  const items=(state.bootstrap && state.bootstrap.items)||[];

  app.innerHTML=`
  <section class="card">
    <h2>${VIEW_LABELS.items}</h2>
    <p class="help">Uso administrativo. Agregue nuevos codigos de insumo.</p>

    <div class="grid">
      <div><label>Codigo</label><input id="i_code" type="text"/></div>
      <div><label>Nombre del item</label><input id="i_name" type="text"/></div>
      <div><label>Stock inicial</label><input id="i_stock" type="number" value="0"/></div>
      <button id="saveItem" class="save">Crear item</button>
    </div>

    <div class="table" style="margin-top:12px">
      <table>
        <thead><tr><th>Codigo</th><th>Nombre</th><th>Stock inicial</th><th>Activo</th></tr></thead>
        <tbody>${items.map(i=>`<tr><td><strong>${esc(i.item_code)}</strong></td><td>${esc(i.item_name)}</td><td>${fmt(i.initial_stock)}</td><td>${i.active?'Si':'No'}</td></tr>`).join('')}</tbody>
      </table>
    </div>
  </section>`;

  document.getElementById('saveItem').onclick=async()=>{
    try{
      await safeServer('createItem',{
        token:state.token,
        code:document.getElementById('i_code').value,
        name:document.getElementById('i_name').value,
        initial_stock:Number(document.getElementById('i_stock').value||0)
      });
      showMsg('Item creado.',true);
      await loadBootstrap();
      renderItems();
    }catch(e){ showMsg(e); }
  };
}

function renderServices(){
  const app=document.getElementById('app');
  const services=(state.bootstrap && state.bootstrap.services)||[];

  app.innerHTML=`
  <section class="card">
    <h2>${VIEW_LABELS.services}</h2>
    <p class="help">Uso administrativo. Agregue nuevos servicios.</p>

    <div class="inline">
      <div>
        <label>Nombre del servicio</label>
        <input id="s_name" type="text" placeholder="Ejemplo: QUIROFANO URGENCIAS"/>
      </div>
      <button id="saveService">Crear servicio</button>
    </div>

    <div class="table" style="margin-top:12px">
      <table>
        <thead><tr><th>Servicio</th><th>Activo</th></tr></thead>
        <tbody>${services.map(s=>`<tr><td>${esc(s.service_name)}</td><td>${s.active?'Si':'No'}</td></tr>`).join('')}</tbody>
      </table>
    </div>
  </section>`;

  document.getElementById('saveService').onclick=async()=>{
    try{
      await safeServer('createService',{token:state.token,service_name:document.getElementById('s_name').value});
      showMsg('Servicio creado.',true);
      await loadBootstrap();
      renderServices();
    }catch(e){ showMsg(e); }
  };
}

async function renderAudit(){
  const app=document.getElementById('app');
  app.innerHTML=`
    <section class="card">
      <h2>${VIEW_LABELS.audit}</h2>
      <p class="help">Uso administrativo. Registro de acciones del sistema.</p>
      <div id="a_tbl" class="table"></div>
    </section>`;

  try{
    const logs=await safeServer('getAudit',{token:state.token});
    document.getElementById('a_tbl').innerHTML=`
      <table>
        <thead><tr><th>Fecha</th><th>Usuario</th><th>Accion</th><th>Entidad</th><th>ID</th><th>Detalle</th></tr></thead>
        <tbody>${logs.map(l=>`<tr><td>${esc(l.created_at)}</td><td>${esc(l.username)}</td><td>${esc(l.action)}</td><td>${esc(l.entity)}</td><td>${esc(l.entity_id)}</td><td>${esc(l.details)}</td></tr>`).join('')}</tbody>
      </table>`;
  }catch(e){ showMsg(e); }
}

function fmt(v){
  const n=Number(v||0);
  return Number.isFinite(n) ? n.toLocaleString('es-PY') : String(v||'');
}

function esc(v){
  return String(v==null?'':v).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));
}
function escAttr(v){ return esc(v); }

(async function init(){
  if(!state.token){ renderLogin(); return; }
  try{
    await loadBootstrap();
    render();
  }catch(_e){
    localStorage.removeItem('kardex_token');
    state.token='';
    renderLogin();
  }
})();
</script>
</body>
</html>
