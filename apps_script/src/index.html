<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Kardex Enfermeria</title>
  <style>
    :root {
      --bg: #f3f8f9;
      --bg-2: #e8f1f4;
      --card: #ffffff;
      --line: #d6e2e6;
      --text: #0f2127;
      --muted: #4d666e;
      --brand: #0b5f6d;
      --brand-2: #147a8c;
      --ok: #0c6a39;
      --err: #992a2a;
      --warn: #7d5a00;
      --entry: #0a7a55;
      --exit: #a23a1d;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      font-family: "Segoe UI", Tahoma, sans-serif;
      background:
        radial-gradient(circle at 10% 0%, #f6fbfc 0%, transparent 34%),
        linear-gradient(145deg, var(--bg) 0%, var(--bg-2) 100%);
    }

    .top {
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid #1d6a78;
      background: linear-gradient(120deg, #0a4852 0%, #0e5a67 70%, #137184 100%);
      color: #fff;
      padding: 14px 16px 12px;
      box-shadow: 0 4px 16px rgba(9, 52, 60, 0.25);
    }

    .top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .title {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .subtitle {
      margin: 4px 0 0;
      opacity: 0.93;
      font-size: 0.87rem;
    }

    .user-pill {
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 999px;
      font-size: 0.84rem;
      padding: 6px 10px;
      white-space: nowrap;
    }

    .menu {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .menu button {
      border: 1px solid rgba(255, 255, 255, 0.35);
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      border-radius: 999px;
      padding: 9px 14px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
    }

    .menu button.active { background: #fff; color: #0b5661; }
    .menu button:hover { filter: brightness(1.08); }

    main {
      max-width: 1320px;
      margin: 0 auto;
      padding: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 14px;
      box-shadow: 0 6px 16px rgba(14, 60, 70, 0.06);
    }

    .narrow { max-width: 460px; margin: 28px auto; }

    h2 {
      margin: 0 0 10px;
      font-size: 1.18rem;
      line-height: 1.2;
    }

    .help {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .steps {
      display: grid;
      grid-template-columns: repeat(3, minmax(180px, 1fr));
      gap: 10px;
      margin-bottom: 8px;
    }

    .step {
      border: 1px dashed #bad0d7;
      border-radius: 10px;
      background: #f7fcfd;
      padding: 8px 10px;
      font-size: 0.88rem;
      color: #33525c;
    }

    .step b { color: #124a57; }

    label {
      display: block;
      margin-top: 10px;
      font-weight: 700;
      font-size: 0.91rem;
    }

    input, select, textarea, button {
      width: 100%;
      margin-top: 4px;
      border: 1px solid #c8d9de;
      border-radius: 10px;
      padding: 11px 12px;
      font-size: 0.95rem;
      background: #fff;
      color: var(--text);
    }

    textarea { min-height: 84px; resize: vertical; }

    button {
      border: none;
      background: var(--brand);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      transition: transform .05s ease, filter .15s ease;
    }

    button:hover { filter: brightness(1.06); }
    button:active { transform: translateY(1px); }

    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn-row button { width: auto; }
    .inline {
      display: grid;
      grid-template-columns: repeat(3, minmax(180px, 1fr));
      gap: 10px;
      align-items: end;
      margin-bottom: 8px;
    }
    .inline button { width: auto; min-width: 180px; }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(130px, 1fr));
      gap: 10px;
      margin-bottom: 10px;
    }

    .kpi {
      border: 1px solid #cee0e5;
      border-radius: 12px;
      background: linear-gradient(150deg, #ffffff 0%, #f4fafb 100%);
      padding: 10px;
    }

    .kpi .k-label { color: #4a6670; font-size: 0.82rem; margin: 0; }
    .kpi .k-value { font-size: 1.2rem; margin: 4px 0 0; font-weight: 800; color: #0f4d59; }
    .kpi.emph {
      background: linear-gradient(135deg, #0f6473 0%, #17859a 100%);
      color: #fff;
      border: none;
    }
    .kpi.emph .k-label { color: rgba(255,255,255,0.86); }
    .kpi.emph .k-value { color: #fff; }

    .insights {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 8px 0 12px;
    }
    .insight-chip {
      border: 1px solid #c8dde3;
      background: #f4fafc;
      color: #2d5460;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.82rem;
      font-weight: 700;
    }
    .insight-chip.alert {
      border-color: #efbeb0;
      background: #fff1ec;
      color: #8d351f;
    }
    .insight-chip.good {
      border-color: #b8dec6;
      background: #ebf8f0;
      color: #0d6b3c;
    }

    .analytics-grid {
      margin-top: 10px;
      display: grid;
      grid-template-columns: repeat(2, minmax(280px, 1fr));
      gap: 10px;
    }
    .chart-card {
      border: 1px solid #d1e2e7;
      border-radius: 12px;
      padding: 10px;
      background: linear-gradient(160deg, #ffffff 0%, #f6fbfd 100%);
      min-height: 290px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.6);
    }
    .chart-title {
      margin: 0 0 8px;
      font-size: 0.92rem;
      color: #174f5b;
      font-weight: 800;
      letter-spacing: .2px;
    }
    .chart-wrap {
      position: relative;
      height: 240px;
    }
    .semaforo-box {
      margin-top: 12px;
      border: 1px solid #d2e2e7;
      border-radius: 12px;
      padding: 10px;
      background: linear-gradient(160deg,#ffffff 0%,#f7fbfd 100%);
    }
    .semaforo-head {
      display: flex;
      gap: 10px;
      align-items: end;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .semaforo-head .field { min-width: 140px; }
    .semaforo-head input { max-width: 130px; }
    .semaforo-kpis {
      display: grid;
      grid-template-columns: repeat(3, minmax(120px, 1fr));
      gap: 8px;
      margin: 8px 0 10px;
    }
    .traffic {
      border-radius: 10px;
      padding: 8px 10px;
      border: 1px solid transparent;
      font-weight: 800;
      font-size: 0.9rem;
    }
    .traffic.red { background: #ffeceb; border-color: #f2b6b0; color: #9e2f28; }
    .traffic.yellow { background: #fff9e8; border-color: #f3df9e; color: #7f610b; }
    .traffic.green { background: #ecf8ef; border-color: #bee1c7; color: #1d6f3e; }
    .semaforo-pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .pill {
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.8rem;
      font-weight: 700;
      border: 1px solid #cddfe5;
      background: #f8fcfd;
      color: #335861;
    }
    .badge {
      display: inline-block;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 800;
      padding: 3px 8px;
      border: 1px solid transparent;
    }
    .badge.red { background:#ffeceb; color:#9e2f28; border-color:#efb9b3; }
    .badge.yellow { background:#fff9e8; color:#7f610b; border-color:#efdca0; }
    .badge.green { background:#ecf8ef; color:#1d6f3e; border-color:#bfdcc8; }
    .select-box {
      border: 1px solid #d1e2e7;
      border-radius: 12px;
      padding: 10px;
      background: linear-gradient(160deg,#ffffff 0%,#f7fbfd 100%);
      margin-top: 10px;
    }
    .select-title {
      margin: 0 0 6px;
      color: #164c58;
      font-size: 0.95rem;
      font-weight: 800;
    }
    .service-box {
      margin-top: 12px;
      border: 1px solid #d2e2e7;
      border-radius: 12px;
      padding: 10px;
      background: linear-gradient(160deg,#ffffff 0%,#f7fbfd 100%);
    }
    .manager-box {
      margin-top: 12px;
      border: 1px solid #d2e2e7;
      border-radius: 12px;
      padding: 10px;
      background: linear-gradient(160deg,#ffffff 0%,#f7fbfd 100%);
    }
    .manager-kpis {
      display: grid;
      grid-template-columns: repeat(4, minmax(150px, 1fr));
      gap: 8px;
      margin: 8px 0 10px;
    }
    .manager-kpi {
      border: 1px solid #d4e3e8;
      border-radius: 10px;
      padding: 9px 10px;
      background: #fbfeff;
    }
    .manager-kpi p { margin: 0; }
    .manager-kpi .label {
      color: #3e616b;
      font-size: 0.8rem;
      font-weight: 700;
    }
    .manager-kpi .value {
      margin-top: 3px;
      font-size: 1.08rem;
      font-weight: 800;
      color: #0f4f5c;
    }
    .item-sheet-card {
      margin-top: 12px;
      border: 1px solid #d2e2e7;
      border-radius: 12px;
      padding: 10px;
      background: linear-gradient(160deg,#ffffff 0%,#f7fbfd 100%);
    }
    .item-sheet-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 8px;
    }
    .item-sheet-kpis {
      display: grid;
      grid-template-columns: repeat(4, minmax(130px, 1fr));
      gap: 8px;
      margin-bottom: 8px;
    }
    .movement-shell {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 12px;
      margin-top: 8px;
    }
    .movement-content {
      --item-accent: #4f8a98;
      --item-soft: #eef8fb;
      border: 1px solid #d2e2e7;
      border-radius: 12px;
      padding: 10px;
      background:
        linear-gradient(165deg, rgba(255,255,255,0.98) 0%, var(--item-soft) 100%);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.7);
      transition: background .25s ease, border-color .25s ease, box-shadow .25s ease;
    }
    .movement-shell.mode-in .movement-content {
      border-color: #a5d6c0;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.75), 0 6px 16px rgba(12,106,57,0.08);
    }
    .movement-shell.mode-out .movement-content {
      border-color: #efc6b8;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.75), 0 6px 16px rgba(153,42,42,0.08);
    }
    .movement-left {
      border: 1px solid #d2e2e7;
      border-radius: 12px;
      background: linear-gradient(170deg, #ffffff 0%, #f5fbfd 100%);
      padding: 10px;
      max-height: 74vh;
      overflow: auto;
    }
    .movement-left h3 {
      margin: 0;
      color: #174f5b;
      font-size: 0.93rem;
    }
    .movement-left p {
      margin: 4px 0 8px;
      color: #4e6971;
      font-size: 0.82rem;
    }
    .movement-item-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .movement-item {
      width: 100%;
      text-align: left;
      border: 1px solid #cddfe5;
      border-left: 8px solid #5f8a98;
      border-radius: 10px;
      background: #f5fafc;
      color: #204f5c;
      padding: 8px 9px;
      cursor: pointer;
      transition: transform .05s ease, box-shadow .15s ease, filter .15s ease;
    }
    .movement-item.active {
      box-shadow: 0 0 0 2px rgba(16, 88, 100, 0.15) inset;
      border-color: #8cb9c5;
      background: #eef8fb;
    }
    .movement-item:hover { filter: brightness(0.99); }
    .movement-item .main {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 0.86rem;
      font-weight: 800;
    }
    .movement-item .sub {
      margin-top: 2px;
      font-size: 0.78rem;
      opacity: 0.92;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 1fr));
      gap: 12px;
      align-items: start;
    }

    .grid button.save {
      grid-column: 1 / -1;
      max-width: 280px;
      font-size: 1rem;
      padding: 12px;
    }

    .move-type {
      display: grid;
      grid-template-columns: repeat(2, minmax(160px, 1fr));
      gap: 10px;
      margin-top: 6px;
    }

    .type-btn {
      border-radius: 12px;
      border: 1px solid #c8d9de;
      padding: 12px;
      font-size: 0.94rem;
      background: #fff;
      color: #184a55;
      font-weight: 700;
    }

    .type-btn.active.entry { background: #eaf8f2; border-color: #9fd3bc; color: var(--entry); }
    .type-btn.active.exit { background: #fff1ec; border-color: #efbeac; color: var(--exit); }

    .note {
      border-left: 4px solid #97bac5;
      background: #f5fafb;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 0.88rem;
      color: #385864;
      margin-top: 10px;
    }
    .movement-shell.mode-in .note {
      border-left-color: #2f9e70;
      background: #ebf8f0;
      color: #0f5d36;
    }
    .movement-shell.mode-out .note {
      border-left-color: #d9654b;
      background: #fff1ec;
      color: #7e2f1a;
    }

    .table {
      overflow: auto;
      border: 1px solid #d5e3e8;
      border-radius: 10px;
      background: #fff;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 0.88rem;
    }

    th, td {
      border: 1px solid #dfebef;
      padding: 7px 8px;
      white-space: nowrap;
      text-align: left;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #ecf6f8;
      color: #114652;
      font-size: 0.83rem;
    }

    td strong { color: #083d47; }

    .chip {
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 0.78rem;
      font-weight: 700;
      display: inline-block;
    }

    .chip.in { background: #e8f8ef; color: #0d6f3d; border: 1px solid #b4dfc4; }
    .chip.out { background: #fff0ea; color: #963b22; border: 1px solid #f0c6b8; }

    .msg {
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 10px;
      font-weight: 700;
      font-size: 0.92rem;
    }

    .msg.ok { background: #e7f8ed; color: var(--ok); border: 1px solid #c2e7ce; }
    .msg.err { background: #ffeded; color: var(--err); border: 1px solid #f0c2c2; }
    .hidden { display: none; }

    .loader {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(7, 35, 41, 0.28);
      z-index: 99;
      backdrop-filter: blur(2px);
    }

    .loader-card {
      background: #fff;
      border: 1px solid #cfdfe4;
      border-radius: 12px;
      padding: 14px 18px;
      font-weight: 700;
      color: #0f4c57;
      box-shadow: 0 10px 25px rgba(7, 35, 41, 0.2);
    }

    .small { font-size: 0.83rem; color: var(--muted); }

    @media (max-width: 980px) {
      .inline { grid-template-columns: 1fr; }
      .grid { grid-template-columns: 1fr; }
      .move-type { grid-template-columns: 1fr; }
      .summary { grid-template-columns: repeat(2, minmax(130px, 1fr)); }
      .steps { grid-template-columns: 1fr; }
      .analytics-grid { grid-template-columns: 1fr; }
      .manager-kpis { grid-template-columns: repeat(2, minmax(130px, 1fr)); }
      .item-sheet-kpis { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
      .movement-shell { grid-template-columns: 1fr; }
      .movement-left { max-height: none; }
      main { padding: 12px; }
    }

    /* Header month badge */
    .header-month-badge {
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 999px;
      font-size: 0.88rem;
      font-weight: 700;
      padding: 6px 12px;
      color: #fff;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .header-month-badge span { opacity: 0.75; font-size: 0.78rem; font-weight: 400; }
    .header-month-input {
      background: transparent;
      border: none;
      color: #fff;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      outline: none;
      width: auto;
      padding: 0;
      margin: 0;
      font-family: inherit;
    }
    .header-month-input::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }

    /* Chart notes */
    .chart-note {
      margin: 4px 0 0;
      font-size: 0.75rem;
      color: #6e8a91;
      font-style: italic;
      line-height: 1.3;
    }

    /* Global tooltip for item panel */
    #globalItemTooltip {
      position: fixed;
      background: #0a3f4a;
      color: #fff;
      padding: 7px 11px;
      border-radius: 8px;
      font-size: 0.82rem;
      z-index: 9999;
      pointer-events: none;
      display: none;
      max-width: 240px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.3);
      line-height: 1.4;
      font-family: "Segoe UI", Tahoma, sans-serif;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
  <script>
    // Register datalabels plugin globally for Chart.js
    if(typeof Chart !== 'undefined' && typeof ChartDataLabels !== 'undefined'){
      Chart.register(ChartDataLabels);
    }
  </script>
</head>
<body>
  <header class="top">
    <div class="top-row">
      <div>
        <h1 class="title">Kardex de Esterilizacion</h1>
        <p class="subtitle">Registro diario de insumos para enfermeria</p>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <div id="headerMonthBadge" class="header-month-badge hidden">
          <span>Mes activo:</span>
          <input type="month" id="headerMonthInput" class="header-month-input"/>
        </div>
        <div id="userLabel" class="user-pill"></div>
      </div>
    </div>
    <nav id="menu" class="menu hidden"></nav>
  </header>

  <main id="app"></main>

  <div id="loader" class="loader">
    <div class="loader-card">Cargando, por favor espere...</div>
  </div>

<script>
const state = {
  token: localStorage.getItem('kardex_token') || '',
  user: null,
  bootstrap: null,
  dashboard: null,
  dashboardRaw: null,
  dashboardMonth: localStorage.getItem('kardex_dash_month') || '',
  dashboardMonthCache: {},
  selectedItems: null,
  selectedSheetItem: localStorage.getItem('kardex_selected_item') || '',
  cutoffDay: Number(localStorage.getItem('kardex_cutoff_day') || 0),
  currentView: 'dashboard',
  movementType: 'OUT',
  chartInstances: {},
  dashboardTableKey: '',
  closureRaw: null,
  closureMonth: '',
  closureCache: {},
  trackingMonth: localStorage.getItem('kardex_track_month') || '',
  trackingRaw: null,
  trackingCache: {},
  semaforo: {
    rojo: Number(localStorage.getItem('kardex_sem_rojo') || 50),
    amarillo: Number(localStorage.getItem('kardex_sem_amarillo') || 150)
  },
  semaforoArea: {
    amarillo: Number(localStorage.getItem('kardex_area_amarillo') || 120),
    rojo: Number(localStorage.getItem('kardex_area_rojo') || 280)
  }
};

const VIEW_LABELS = {
  dashboard: 'Tablero',
  closure: 'Cierre mensual',
  movements: 'Registrar movimiento',
  tracking: 'Seguimiento de carga',
  items: 'Catalogo de items',
  services: 'Catalogo de proveedores',
  audit: 'Auditoria'
};

function setLoading(on) {
  document.getElementById('loader').style.display = on ? 'flex' : 'none';
}

function showMsg(text, ok=false){
  const el=document.createElement('div');
  el.className='msg '+(ok?'ok':'err');
  el.textContent=text;
  const app=document.getElementById('app');
  app.prepend(el);
  setTimeout(()=>el.remove(),6500);
}

function runServer(fn, payload){
  return new Promise((resolve,reject)=>{
    google.script.run
      .withSuccessHandler(resolve)
      .withFailureHandler(err=>reject(err && err.message ? err.message : String(err)))
      [fn](payload);
  });
}

async function safeServer(fn, payload){
  setLoading(true);
  try { return await runServer(fn, payload); }
  finally { setLoading(false); }
}

function roleName(role){
  if(role==='admin') return 'Administracion';
  if(role==='operator') return 'Operador/a';
  return 'Consulta';
}

function render(){
  if(!state.token){ renderLogin(); return; }
  renderShell();
  if(state.currentView==='dashboard') renderDashboard();
  if(state.currentView==='closure') renderClosure();
  if(state.currentView==='movements') renderMovements();
  if(state.currentView==='tracking') renderTracking();
  if(state.currentView==='items') renderItems();
  if(state.currentView==='services') renderServices();
  if(state.currentView==='audit') renderAudit();
}

function renderLogin(){
  document.getElementById('menu').classList.add('hidden');
  document.getElementById('userLabel').textContent='No autenticado';

  const app=document.getElementById('app');
  app.innerHTML=`
    <section class="card narrow">
      <h2>Bienvenida/o</h2>
      <p class="help">Ingrese su usuario y contrasena para comenzar.</p>
      <label>Usuario</label>
      <input id="u" type="text" autocomplete="username" placeholder="Ejemplo: user"/>

      <label>Contrasena</label>
      <input id="p" type="password" autocomplete="current-password" placeholder="Ingrese su contrasena"/>

      <div class="btn-row" style="margin-top:12px">
        <button id="b">Entrar al sistema</button>
      </div>
      <p class="small">Version <?= appVersion ?></p>
    </section>`;

  document.getElementById('u').focus();
  document.getElementById('p').addEventListener('keydown', (e)=>{ if(e.key==='Enter') document.getElementById('b').click(); });

  document.getElementById('b').onclick=async()=>{
    try{
      const username=document.getElementById('u').value.trim();
      const password=document.getElementById('p').value;
      if(!username || !password){ showMsg('Complete usuario y contrasena.'); return; }

      const out=await safeServer('login',{username,password});
      state.token=out.token;
      localStorage.setItem('kardex_token',state.token);
      state.user=out.user;
      await loadBootstrap();
      state.currentView='dashboard';
      render();
      showMsg('Ingreso correcto. Bienvenida/o.', true);
    }catch(e){ showMsg(e); }
  };
}

async function loadBootstrap(){
  const out=await safeServer('getBootstrap',state.token);
  state.bootstrap=out;
  state.user=out.user;
  state.closureCache={};
}

function renderShell(){
  document.getElementById('userLabel').textContent = state.user ? `${state.user.username} · ${roleName(state.user.role)}` : '';

  const menu=document.getElementById('menu');
  menu.classList.remove('hidden');
  menu.innerHTML='';

  const canWrite=state.user && (state.user.role==='admin' || state.user.role==='operator');
  const isAdmin=state.user && state.user.role==='admin';

  addMenuBtn(menu,'Tablero','dashboard',()=>{state.currentView='dashboard';render();});
  addMenuBtn(menu,'Cierre mensual','closure',()=>{state.currentView='closure';render();});
  addMenuBtn(menu,'Seguimiento','tracking',()=>{state.currentView='tracking';render();});
  if(canWrite) addMenuBtn(menu,'Registrar','movements',()=>{state.currentView='movements';render();});
  initHeaderMonthInput();
  if(isAdmin){
    addMenuBtn(menu,'Items','items',()=>{state.currentView='items';render();});
    addMenuBtn(menu,'Proveedores','services',()=>{state.currentView='services';render();});
    addMenuBtn(menu,'Auditoria','audit',()=>{state.currentView='audit';render();});
    addMenuBtn(menu,'Inicializar','init',async()=>{
      try{
        await safeServer('initSchema',{token:state.token});
        invalidateDashboardClientCache();
        state.closureCache={};
        showMsg('Hojas inicializadas correctamente.',true);
        await loadBootstrap();
      }catch(e){ showMsg(e); }
    });
  }

  addMenuBtn(menu,'Salir','logout',async()=>{
    try{ await safeServer('logout',state.token); }catch(_e){}
    localStorage.removeItem('kardex_token');
    state.token=''; state.user=null; state.bootstrap=null;
    renderLogin();
  });
}

function addMenuBtn(menu,label,view,cb){
  const b=document.createElement('button');
  b.textContent=label;
  if(state.currentView===view) b.classList.add('active');
  b.onclick=cb;
  b.style.width='auto';
  menu.appendChild(b);
}

async function renderTracking(){
  const app=document.getElementById('app');
  const monthDefault=state.trackingMonth||state.dashboardMonth||new Date().toISOString().slice(0,7);
  app.innerHTML=`
  <section class="card">
    <h2>${VIEW_LABELS.tracking}</h2>
    <p class="help">Control de entradas y salidas registradas por dia y por insumo. Permite verificar el impacto de las cargas y la continuidad entre meses.</p>
    <div class="inline" style="margin-bottom:12px">
      <div>
        <label>Mes de consulta</label>
        <input id="t_month" type="month" value="${monthDefault}"/>
      </div>
      <button id="t_loadBtn">Cargar datos</button>
    </div>
    <div id="trackingHeader" class="note" style="margin-bottom:8px"></div>
    <div id="trackingVerif" class="note" style="margin-bottom:8px;display:none"></div>
    <div id="trackingControls" class="btn-row" style="margin-bottom:8px;display:none">
      <button id="t_showBoth" style="background:#0b5f6d;width:auto">Entradas y salidas</button>
      <button id="t_showIn" style="background:#0a7a55;width:auto">Solo entradas</button>
      <button id="t_showOut" style="background:#a23a1d;width:auto">Solo salidas</button>
      <button id="t_verifBtn" style="background:#4f5f6b;width:auto">Verificar continuidad con mes anterior</button>
    </div>
    <div id="trackingPedidoControls" class="inline" style="margin:8px 0;display:none">
      <div>
        <label>Bloque 10 dias mes actual</label>
        <select id="t_currBlock">
          <option value="b1">Dias 1-10</option>
          <option value="b2">Dias 11-20</option>
          <option value="b3">Dias 21-fin de mes</option>
        </select>
      </div>
      <div>
        <label>Comparar con bloque mes anterior</label>
        <select id="t_prevBlock">
          <option value="auto">Automatico (mejor bloque disponible)</option>
          <option value="b1">Dias 1-10</option>
          <option value="b2">Dias 11-20</option>
          <option value="b3">Dias 21-fin de mes</option>
        </select>
      </div>
      <div>
        <label>Stock actual al dia</label>
        <select id="t_stockDay"></select>
      </div>
    </div>
    <div id="trackingPedidoNote" class="note" style="margin-bottom:8px;display:none"></div>
    <div id="trackingTable" class="table" style="overflow:auto;max-height:72vh"></div>
    <div id="trackingVerifTable" class="table" style="margin-top:10px;display:none"></div>
    <div id="trackingPedidoTable" class="table" style="margin-top:10px;display:none"></div>
  </section>`;

  let trackingMode='both';
  let prevMonthRaw=null;

  function renderTrackingTable(raw,mode){
    const header=document.getElementById('trackingHeader');
    const table=document.getElementById('trackingTable');
    const controls=document.getElementById('trackingControls');
    if(!raw||!raw.rows){ if(header) header.textContent='Sin datos para este mes.'; return; }
    const daysInMonth=Number(raw.days_in_month||0);
    const days=[]; for(let d=1;d<=daysInMonth;d++) days.push(d);
    const totalIn=raw.rows.reduce((s,r)=>(r.in_by_day||[]).reduce((a,v)=>a+Number(v||0),s),0);
    const totalOut=raw.rows.reduce((s,r)=>(r.out_by_day||[]).reduce((a,v)=>a+Number(v||0),s),0);
    header.innerHTML=`<strong>Mes:</strong> ${esc(raw.month)} &nbsp;|&nbsp; <strong>Movimientos:</strong> ${fmt(raw.movement_count)} &nbsp;|&nbsp; <strong style="color:#0a7a55">Total entradas: ${fmt(totalIn)}</strong> &nbsp;|&nbsp; <strong style="color:#a23a1d">Total salidas: ${fmt(totalOut)}</strong>`;
    controls.style.display='';

    const dayHeaders=days.map(d=>{
      const hasD=raw.rows.some(r=>Number((r.in_by_day&&r.in_by_day[d-1])||0)>0||Number((r.out_by_day&&r.out_by_day[d-1])||0)>0);
      const hs=hasD?'background:#e8f5f7;font-weight:800':'';
      if(mode==='both') return `<th colspan="2" style="${hs};text-align:center" title="Dia ${d}">D${d}<div style="font-size:0.72rem;font-weight:400;opacity:0.65">E/S</div></th>`;
      if(mode==='in') return `<th style="${hs};text-align:center" title="Dia ${d}">D${d}<div style="font-size:0.72rem;font-weight:400;opacity:0.65">E</div></th>`;
      return `<th style="${hs};text-align:center" title="Dia ${d}">D${d}<div style="font-size:0.72rem;font-weight:400;opacity:0.65">S</div></th>`;
    }).join('');

    const rows=raw.rows.map(r=>{
      const totIn=(r.in_by_day||[]).reduce((a,v)=>a+Number(v||0),0);
      const totOut=(r.out_by_day||[]).reduce((a,v)=>a+Number(v||0),0);
      const saldoFin=Number(r.stock_inicial_mes||0)+totIn-totOut;
      const cells=days.map(d=>{
        const iv=Number((r.in_by_day&&r.in_by_day[d-1])||0);
        const ov=Number((r.out_by_day&&r.out_by_day[d-1])||0);
        if(mode==='both'){
          const ic=iv>0?`<td style="background:#f0fbf4;color:#0a7a55;font-weight:700;text-align:center;padding:4px 5px">${iv}</td>`:`<td style="text-align:center;color:#ddd;padding:4px 3px">-</td>`;
          const oc=ov>0?`<td style="background:#fff4f0;color:#a23a1d;font-weight:700;text-align:center;padding:4px 5px">${ov}</td>`:`<td style="text-align:center;color:#ddd;padding:4px 3px">-</td>`;
          return ic+oc;
        }
        if(mode==='in') return iv>0?`<td style="background:#f0fbf4;color:#0a7a55;font-weight:700;text-align:center">${iv}</td>`:`<td style="text-align:center;color:#ddd">-</td>`;
        return ov>0?`<td style="background:#fff4f0;color:#a23a1d;font-weight:700;text-align:center">${ov}</td>`:`<td style="text-align:center;color:#ddd">-</td>`;
      }).join('');
      return `<tr>
        <td style="position:sticky;left:0;z-index:2;background:#ecf6f8;font-weight:800;white-space:nowrap" title="${escAttr(r.item_name)}">${esc(r.item_code)}</td>
        <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:0.84rem" title="${escAttr(r.item_name)}">${esc(r.item_name)}</td>
        <td style="text-align:right;font-weight:700">${fmt(r.stock_inicial_mes)}</td>
        ${cells}
        <td style="text-align:right;background:#e8f8ef;color:#0a7a55;font-weight:800">${totIn>0?fmt(totIn):'-'}</td>
        <td style="text-align:right;background:#fff1ed;color:#a23a1d;font-weight:800">${totOut>0?fmt(totOut):'-'}</td>
        <td style="text-align:right;font-weight:800;color:#0f4d59">${fmt(saldoFin)}</td>
      </tr>`;
    }).join('');

    table.innerHTML=`<table>
      <thead><tr>
        <th style="position:sticky;left:0;z-index:3;background:#ecf6f8">Codigo</th>
        <th>Descripcion</th>
        <th>Saldo Inicio</th>
        ${dayHeaders}
        <th style="background:#d8f4e5;color:#0a7a55">Total E</th>
        <th style="background:#fde8e0;color:#a23a1d">Total S</th>
        <th>Saldo Final</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  }

  function getTenDayBlocks(daysInMonth){
    const dmax=Math.max(1, Number(daysInMonth||0));
    return [
      { key:'b1', label:'Dias 1-10', start:1, end:Math.min(10,dmax) },
      { key:'b2', label:'Dias 11-20', start:Math.min(11,dmax), end:Math.min(20,dmax) },
      { key:'b3', label:'Dias 21-fin de mes', start:Math.min(21,dmax), end:dmax }
    ];
  }

  function sumRange(arr,start,end){
    if(!arr||!arr.length) return 0;
    let total=0;
    for(let d=start; d<=end; d++){
      total += Number(arr[d-1]||0);
    }
    return total;
  }

  function getStockAtDay(row,day){
    const inByDay=row.in_by_day||[];
    const outByDay=row.out_by_day||[];
    let inTotal=0, outTotal=0;
    for(let i=0;i<day;i++){
      inTotal += Number(inByDay[i]||0);
      outTotal += Number(outByDay[i]||0);
    }
    return Number(row.stock_inicial_mes||0) + inTotal - outTotal;
  }

  function renderTrackingPedido(raw){
    const controls=document.getElementById('trackingPedidoControls');
    const note=document.getElementById('trackingPedidoNote');
    const table=document.getElementById('trackingPedidoTable');
    const daySel=document.getElementById('t_stockDay');
    const currSel=document.getElementById('t_currBlock');
    const prevSel=document.getElementById('t_prevBlock');
    if(!controls||!note||!table||!daySel||!currSel||!prevSel) return;
    if(!raw||!raw.rows||!raw.rows.length){
      controls.style.display='none';
      note.style.display='none';
      table.style.display='none';
      return;
    }

    controls.style.display='';
    table.style.display='';
    note.style.display='';

    const daysInMonth=Number(raw.days_in_month||0);
    const today=new Date();
    const curMonth=today.toISOString().slice(0,7);
    const isCurrentMonth=String(raw.month||'')===curMonth;
    const defaultDay=isCurrentMonth ? Math.min(daysInMonth, Number(today.getDate()||daysInMonth)) : daysInMonth;
    if(!daySel.options.length || Number(daySel.options.length)!==daysInMonth){
      daySel.innerHTML=Array.from({length:daysInMonth},(_,i)=>{
        const d=i+1;
        return `<option value="${d}">Dia ${d}</option>`;
      }).join('');
      daySel.value=String(defaultDay||daysInMonth||1);
    }

    const blocksCurrent=getTenDayBlocks(daysInMonth);
    const currBlock=blocksCurrent.find(b=>b.key===currSel.value) || blocksCurrent[0];
    const stockDay=Math.max(1, Math.min(daysInMonth, Number(daySel.value||daysInMonth)));

    const prevRowsByCode={};
    const prevDays=Number((prevMonthRaw && prevMonthRaw.days_in_month) || 0);
    if(prevMonthRaw && prevMonthRaw.rows){
      prevMonthRaw.rows.forEach(r=>{ prevRowsByCode[String(r.item_code||'')]=r; });
    }
    const prevBlocks=getTenDayBlocks(prevDays||30);

    const lines=raw.rows.map(r=>{
      const code=String(r.item_code||'');
      const prev=prevRowsByCode[code];
      const curr10=sumRange(r.out_by_day||[], currBlock.start, currBlock.end);

      let prev10=0;
      let prevUsedLabel='Sin datos previos';
      if(prev){
        if(prevSel.value==='auto'){
          let best={qty:0,label:'Sin datos previos'};
          prevBlocks.forEach(b=>{
            if(b.start>b.end) return;
            const q=sumRange(prev.out_by_day||[], b.start, b.end);
            if(q>best.qty){
              best={qty:q,label:b.label};
            }
          });
          prev10=best.qty;
          prevUsedLabel=best.label;
        }else{
          const pb=prevBlocks.find(b=>b.key===prevSel.value) || prevBlocks[0];
          prev10=sumRange(prev.out_by_day||[], pb.start, pb.end);
          prevUsedLabel=pb.label;
        }
      }

      const consumo10=Math.max(prev10,curr10);
      const plus30=consumo10*0.3;
      const suma=consumo10+plus30;
      const stockActual=getStockAtDay(r,stockDay);
      const pedido=Math.max(0, Math.ceil(suma-stockActual));
      return {
        code: code,
        name: String(r.item_name||''),
        prev10: prev10,
        curr10: curr10,
        consumo10: consumo10,
        plus30: plus30,
        suma: suma,
        stockActual: stockActual,
        pedido: pedido,
        prevUsedLabel: prevUsedLabel
      };
    });

    lines.sort((a,b)=>b.pedido-a.pedido||b.consumo10-a.consumo10||String(a.code).localeCompare(String(b.code)));
    const totalPedido=lines.reduce((a,r)=>a+Number(r.pedido||0),0);
    const totalConsumo=lines.reduce((a,r)=>a+Number(r.consumo10||0),0);
    note.innerHTML=`<strong>Calculo de pedido:</strong> consumo 10 dias = MAX(consumo bloque actual, consumo bloque mes anterior). Se agrega 30% de seguridad. <strong>Stock actual</strong> calculado al dia ${stockDay}. Pedido sugerido = MAX(0, Suma - Stock actual). Total pedido sugerido: <strong>${fmt(totalPedido)}</strong> unidades.`;

    table.innerHTML=`<table>
      <thead><tr>
        <th>ITEM</th>
        <th>CONSUMO 10 DIAS MES ANTERIOR</th>
        <th>CONSUMO 10 DIAS MES ACTUAL</th>
        <th>CONSUMO 10 DIAS</th>
        <th>30%</th>
        <th>Suma</th>
        <th>Stock actual</th>
        <th>Pedido</th>
      </tr></thead>
      <tbody>
        ${lines.map(r=>`<tr>
          <td title="${escAttr(r.name)}"><strong>${esc(r.code)}</strong></td>
          <td title="${escAttr(r.prevUsedLabel)}">${fmt(Math.round(r.prev10))}</td>
          <td>${fmt(Math.round(r.curr10))}</td>
          <td><strong>${fmt(Math.round(r.consumo10))}</strong></td>
          <td>${fmt(Math.round(r.plus30))}</td>
          <td>${fmt(Math.round(r.suma))}</td>
          <td>${fmt(Math.round(r.stockActual))}</td>
          <td style="${r.pedido>0?'color:#a23a1d;font-weight:800':'color:#0a7a55;font-weight:700'}">${fmt(r.pedido)}</td>
        </tr>`).join('')}
        <tr style="background:#eef5f7;font-weight:800">
          <td>TOTAL</td>
          <td>-</td>
          <td>-</td>
          <td>${fmt(Math.round(totalConsumo))}</td>
          <td>-</td>
          <td>-</td>
          <td>-</td>
          <td>${fmt(totalPedido)}</td>
        </tr>
      </tbody>
    </table>`;
  }

    const selectedMonth=mi.value;
    state.trackingMonth=selectedMonth;
    localStorage.setItem('kardex_track_month',selectedMonth);
    updateHeaderMonth(selectedMonth);
    if(!force&&state.trackingCache[selectedMonth]){
      state.trackingRaw=state.trackingCache[selectedMonth];
      renderTrackingTable(state.trackingRaw,trackingMode);
      await loadTrackingPrevMonth();
      renderTrackingPedido(state.trackingRaw);
      return;
    }

      const out=await safeServer('getMonthlyClosure',{token:state.token,month:selectedMonth});
      if(out&&out.month){ mi.value=out.month; state.trackingMonth=out.month; localStorage.setItem('kardex_track_month',out.month); }
      state.trackingRaw=out;
      if(state.trackingMonth) state.trackingCache[state.trackingMonth]=out;
      renderTrackingTable(state.trackingRaw,trackingMode);
      await loadTrackingPrevMonth();
      renderTrackingPedido(state.trackingRaw);
    }catch(e){ showMsg(e); }
  }

  async function loadTrackingPrevMonth(){
    prevMonthRaw=null;
    if(!state.trackingRaw||!state.trackingRaw.month) return;
    const [y,m]=String(state.trackingRaw.month).split('-').map(Number);
    if(!y||!m) return;
    const prevD=new Date(y,m-2,1);
    const prevMonth=prevD.getFullYear()+'-'+String(prevD.getMonth()+1).padStart(2,'0');
    try{
      prevMonthRaw=state.trackingCache[prevMonth]||await safeServer('getMonthlyClosure',{token:state.token,month:prevMonth});
      if(!state.trackingCache[prevMonth]) state.trackingCache[prevMonth]=prevMonthRaw;
    }catch(_e){
      prevMonthRaw=null;
    }
  }

  document.getElementById('t_showOut').onclick=()=>{ trackingMode='out'; renderTrackingTable(state.trackingRaw,'out'); };

  document.getElementById('t_prevBlock').onchange=()=>renderTrackingPedido(state.trackingRaw);
  document.getElementById('t_stockDay').onchange=()=>renderTrackingPedido(state.trackingRaw);

  document.getElementById('t_verifBtn').onclick=async()=>{
    const verif=document.getElementById('trackingVerifTable');
    const verifNote=document.getElementById('trackingVerif');
    if(!state.trackingRaw||!state.trackingRaw.month){ showMsg('Cargue primero los datos del mes.'); return; }
    const currentMonth=state.trackingRaw.month;
    const [y,m]=currentMonth.split('-').map(Number);
    const prevD=new Date(y,m-2,1);
    const prevMonth=prevD.getFullYear()+'-'+String(prevD.getMonth()+1).padStart(2,'0');
    try{
      const prevRaw=state.trackingCache[prevMonth]||await safeServer('getMonthlyClosure',{token:state.token,month:prevMonth});
      if(!state.trackingCache[prevMonth]) state.trackingCache[prevMonth]=prevRaw;
      if(!prevRaw||!prevRaw.rows){ showMsg('No hay datos del mes anterior ('+prevMonth+').'); return; }
      const prevEnd={};
      prevRaw.rows.forEach(r=>{
        const tIn=(r.in_by_day||[]).reduce((a,v)=>a+Number(v||0),0);
        const tOut=(r.out_by_day||[]).reduce((a,v)=>a+Number(v||0),0);
        prevEnd[r.item_code]=Number(r.stock_inicial_mes||0)+tIn-tOut;
      });
      const vrows=state.trackingRaw.rows.map(r=>{
        const prev=prevEnd[r.item_code];
        const curr=Number(r.stock_inicial_mes||0);
        const match=prev!==undefined&&prev===curr;
        const diff=prev!==undefined?curr-prev:null;
        return {code:r.item_code,name:r.item_name,prev,curr,match,diff};
      });
      const allOk=vrows.every(r=>r.match);
      const badCount=vrows.filter(r=>!r.match).length;
      verifNote.innerHTML=allOk
        ?`<strong style="color:#0a7a55">&#10003; Verificacion correcta:</strong> El saldo inicial de <strong>${esc(currentMonth)}</strong> coincide con el saldo final de <strong>${esc(prevMonth)}</strong> en todos los items.`
        :`<strong style="color:#a23a1d">&#9888; Atencion:</strong> ${badCount} item(s) presentan diferencia entre el saldo final de <strong>${esc(prevMonth)}</strong> y el saldo inicial de <strong>${esc(currentMonth)}</strong>. Verifique si se modifico el stock inicial de algun item.`;
      verifNote.style.display='';
      verif.style.display='';
      verif.innerHTML=`<table>
        <thead><tr>
          <th>Codigo</th><th>Descripcion</th>
          <th>Saldo Final ${esc(prevMonth)}</th>
          <th>Saldo Inicial ${esc(currentMonth)}</th>
          <th>Diferencia</th><th>Estado</th>
        </tr></thead>
        <tbody>${vrows.map(r=>`<tr>
          <td><strong>${esc(r.code)}</strong></td>
          <td>${esc(r.name)}</td>
          <td style="text-align:right">${r.prev!==undefined?fmt(r.prev):'-'}</td>
          <td style="text-align:right">${fmt(r.curr)}</td>
          <td style="text-align:right;${r.diff!==null&&r.diff!==0?'color:#a23a1d;font-weight:700':'color:#0a7a55'}">${r.diff!==null?(r.diff===0?'&#10003; 0':fmt(r.diff)):'N/A'}</td>
          <td>${r.match?'<span class="badge green">OK</span>':(r.prev===undefined?'<span class="badge yellow">Sin datos prev.</span>':'<span class="badge red">Diferencia</span>')}</td>
        </tr>`).join('')}</tbody>
      </table>`;
    }catch(e){ showMsg(e); }
  };

  await loadTrackingData(false);
}

function pad2(n){ return String(Number(n||0)).padStart(2,'0'); }

function parseCutoffLabelParts(label){
  const s=String(label||'');
  const m=s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(!m) return { year:'-', month:'-', day:'-' };
  return { year:m[1], month:String(Number(m[2])), day:String(Number(m[3])) };
}

function findLatestMonthWithData(recentRows){
  const rows=recentRows||[];
  let best='';
  rows.forEach(r=>{
    const d=String((r && r.movement_date) || '');
    if(!/^\d{4}-\d{2}-\d{2}$/.test(d)) return;
    const m=d.slice(0,7);
    if(m>best) best=m;
  });
  return best;
}

function getClosureData(raw){
  if(!raw) return null;
  if(raw.rows && raw.days_in_month){
    const dmax=Number(raw.days_in_month||0);
    let cutoffDay=Number(state.cutoffDay||0);
    if(!cutoffDay || cutoffDay<1 || cutoffDay>dmax) cutoffDay=dmax;
    const rows=(raw.rows||[]).map(r=>{
      let entradas=0, salidas=0;
      const inByDay=(r.in_by_day||[]);
      const outByDay=(r.out_by_day||[]);
      for(let i=0;i<cutoffDay;i++){
        entradas += Number(inByDay[i]||0);
        salidas += Number(outByDay[i]||0);
      }
      const stockInicial=Number(r.stock_inicial_mes||0);
      return {
        item_code: r.item_code,
        item_name: r.item_name,
        stock_inicial: stockInicial,
        entradas: entradas,
        salidas: salidas,
        saldo_final: stockInicial + entradas - salidas
      };
    });
    rows.sort((a,b)=>{
      const an=Number(a.item_code), bn=Number(b.item_code);
      const aNum=Number.isFinite(an) && String(a.item_code).trim()!=='';
      const bNum=Number.isFinite(bn) && String(b.item_code).trim()!=='';
      if(aNum && bNum) return an-bn;
      if(aNum) return -1;
      if(bNum) return 1;
      return String(a.item_code).localeCompare(String(b.item_code));
    });
    const totals=rows.reduce((acc,r)=>{
      acc.stock_inicial += r.stock_inicial;
      acc.entradas += r.entradas;
      acc.salidas += r.salidas;
      acc.saldo_final += r.saldo_final;
      return acc;
    },{stock_inicial:0,entradas:0,salidas:0,saldo_final:0});
    return {
      model: { cutoffLabel: `${raw.month}-${pad2(cutoffDay)}` },
      rows: rows,
      totals: totals,
      movement_count: Number(raw.movement_count || 0)
    };
  }
  const model=buildCutoffModel(raw);
  const rows=((model && model.rows) || []).map(r=>({
    item_code: r.item_code,
    item_name: r.item_name,
    stock_inicial: Number(r.start_balance||0),
    entradas: Number(r.in_until||0),
    salidas: Number(r.out_until||0),
    saldo_final: Number(r.cutoff_balance||0)
  }));
  rows.sort((a,b)=>{
    const an=Number(a.item_code), bn=Number(b.item_code);
    const aNum=Number.isFinite(an) && String(a.item_code).trim()!=='';
    const bNum=Number.isFinite(bn) && String(b.item_code).trim()!=='';
    if(aNum && bNum) return an-bn;
    if(aNum) return -1;
    if(bNum) return 1;
    return String(a.item_code).localeCompare(String(b.item_code));
  });
  const totals=rows.reduce((acc,r)=>{
    acc.stock_inicial += r.stock_inicial;
    acc.entradas += r.entradas;
    acc.salidas += r.salidas;
    acc.saldo_final += r.saldo_final;
    return acc;
  },{stock_inicial:0,entradas:0,salidas:0,saldo_final:0});
  const moveCount=((raw && raw.month_movements) || []).length;
  return { model, rows, totals, movement_count: moveCount };
}

async function loadClosureData(forceReload){
  try{
    const monthInput=document.getElementById('c_month');
    const selectedMonth=monthInput.value;
    if(!forceReload && state.closureCache[selectedMonth]){
      state.closureRaw=state.closureCache[selectedMonth];
      state.closureMonth=selectedMonth;
      const cached=state.closureRaw;
      const dmax=Number((cached && cached.days_in_month) || 0);
      const days=[];
      for(let d=1; d<=dmax; d++) days.push(d);
      syncCutoffSelector(days, 'c_cutoffDay');
      renderClosureTable();
      return;
    }
    const out=await safeServer('getMonthlyClosure',{token:state.token,month:selectedMonth});
    if(out && out.month && monthInput.value!==out.month){
      monthInput.value=out.month;
      if(out.auto_switched_month){
        showMsg(`No hay movimientos en ${selectedMonth}. Se cargó automáticamente ${out.month}.`, true);
      }
    }
    state.closureRaw=out;
    state.closureMonth=out && out.month ? out.month : monthInput.value;
    if(state.closureMonth){
      state.closureCache[state.closureMonth]=out;
    }
    const dmax=Number((out && out.days_in_month) || 0);
    const days=[];
    for(let d=1; d<=dmax; d++) days.push(d);
    syncCutoffSelector(days, 'c_cutoffDay');
    renderClosureTable();
  }catch(e){ showMsg(e); }
}

function downloadBlob(filename, mimeType, content){
  const blob=new Blob([content], {type:mimeType});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function syncCutoffSelector(days, targetId){
  const sel=document.getElementById(targetId || 'cutoffDay');
  if(!sel || !days || !days.length) return;
  const maxDay=Math.max(...days.map(d=>Number(d||0)));
  let desired=Number(state.cutoffDay||0);
  if(!desired || desired<1 || desired>maxDay) desired=maxDay;
  state.cutoffDay=desired;
  localStorage.setItem('kardex_cutoff_day', String(desired));
  sel.innerHTML=days.map(d=>{
    const n=Number(d||0);
    const tag = n===maxDay ? ' (fin de mes)' : '';
    return `<option value="${n}">Dia ${n}${tag}</option>`;
  }).join('');
  sel.value=String(desired);
}

function buildCutoffModel(out){
  const rows=(out && out.rows) || [];
  const days=(out && out.days) || [];
  const mm=(out && out.month_movements) || [];
  if(!days.length){
    return { cutoffDay: 0, cutoffIndex: 0, rows: [], serviceRows: [], totalByDay: [], cumulativeIn: [], cumulativeOut: [] };
  }

  const maxDay=Math.max(...days.map(d=>Number(d||0)));
  let cutoffDay=Number(state.cutoffDay||maxDay);
  if(!cutoffDay || cutoffDay<1 || cutoffDay>maxDay) cutoffDay=maxDay;
  const cutoffIndex=Math.max(0, cutoffDay-1);
  const itemAgg={};
  const serviceAgg={};
  let totalOutUntil=0;
  let totalInUntil=0;

  mm.forEach(m=>{
    const day=Number(m.day||0);
    if(!day || day>cutoffDay) return;
    const code=String(m.item_code||'');
    const svc=String(m.service_name||'').trim().toUpperCase();
    const qty=Number(m.quantity||0);
    const type=String(m.move_type||'').toUpperCase();
    if(!code || !qty) return;
    if(!itemAgg[code]) itemAgg[code]={in_qty:0,out_qty:0};
    if(type==='IN'){
      itemAgg[code].in_qty += qty;
      totalInUntil += qty;
    }else if(type==='OUT'){
      itemAgg[code].out_qty += qty;
      totalOutUntil += qty;
      if(svc){
        if(!serviceAgg[svc]) serviceAgg[svc]=0;
        serviceAgg[svc] += qty;
      }
    }
  });

  const cutoffRows=rows.map(r=>{
    const code=String(r.item_code||'');
    const start=Number(r.start_balance||0);
    const end=Number(r.end_balance||0);
    const cut=Number(r.day_values?.[cutoffIndex] ?? end);
    const agg=itemAgg[code] || {in_qty:0,out_qty:0};
    const dailyOutRate = cutoffDay>0 ? agg.out_qty / cutoffDay : 0;
    let coverageDays = null;
    if(dailyOutRate > 0) coverageDays = cut / dailyOutRate;
    let coverageLevel='green';
    let coverageText='Estable';
    if(cut<=0){
      coverageLevel='red'; coverageText='Sin stock';
    }else if(coverageDays != null && coverageDays < 3){
      coverageLevel='red'; coverageText='Critico (<3 dias)';
    }else if(coverageDays != null && coverageDays < 7){
      coverageLevel='yellow'; coverageText='Alerta (3-7 dias)';
    }else if(coverageDays == null){
      coverageText='Sin consumo';
    }
    return {
      item_code: code,
      item_name: r.item_name,
      start_balance: start,
      end_balance: end,
      cutoff_balance: cut,
      cutoff_diff: cut-start,
      in_until: agg.in_qty,
      out_until: agg.out_qty,
      daily_out_rate: dailyOutRate,
      coverage_days: coverageDays,
      coverage_level: coverageLevel,
      coverage_text: coverageText,
      day_values: r.day_values || []
    };
  });

  const serviceRows = Object.keys(serviceAgg)
    .map(name=>({ service_name:name, out_qty:Number(serviceAgg[name]||0) }))
    .sort((a,b)=>b.out_qty-a.out_qty);

  const totalByDay=days.map((_,idx)=>cutoffRows.reduce((acc,r)=>acc+Number(r.day_values[idx]||0),0));
  const dayIn={};
  const dayOut={};
  mm.forEach(m=>{
    const d=Number(m.day||0);
    if(!d) return;
    const q=Number(m.quantity||0);
    const t=String(m.move_type||'').toUpperCase();
    if(t==='IN') dayIn[d]=(dayIn[d]||0)+q;
    if(t==='OUT') dayOut[d]=(dayOut[d]||0)+q;
  });
  const cumulativeIn=[];
  const cumulativeOut=[];
  let runIn=0;
  let runOut=0;
  for(let d=1; d<=days.length; d++){
    runIn += Number(dayIn[d]||0);
    runOut += Number(dayOut[d]||0);
    cumulativeIn.push(d<=cutoffDay ? runIn : null);
    cumulativeOut.push(d<=cutoffDay ? runOut : null);
  }

  return {
    cutoffDay,
    cutoffIndex,
    cutoffLabel: `${out.month}-${pad2(cutoffDay)}`,
    rows: cutoffRows,
    serviceRows,
    totalByDay,
    cumulativeIn,
    cumulativeOut,
    totalOutUntil,
    totalInUntil,
    monthDays: days.length
  };
}

function colorRamp(i){
  const palette=['#0b5f6d','#1d8091','#2c9bb0','#62b8c8','#97d3dc','#f39a6b','#e66f51','#c44a3f','#7fb069','#4f8f5f','#8b7bd1','#aa8bd7'];
  return palette[i%palette.length];
}

function fitCanvas(canvas){
  if(!canvas) return null;
  const ratio=window.devicePixelRatio || 1;
  const parent=canvas.parentElement;
  const rect=parent ? parent.getBoundingClientRect() : null;
  const w=Math.max(320, Math.floor((rect && rect.width) || canvas.clientWidth || 600));
  const h=Math.max(180, Math.floor((rect && rect.height) || canvas.clientHeight || 240));
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  canvas.width=Math.floor(w*ratio);
  canvas.height=Math.floor(h*ratio);
  const ctx=canvas.getContext('2d');
  if(!ctx) return null;
  ctx.setTransform(ratio,0,0,ratio,0,0);
  ctx.clearRect(0,0,w,h);
  return {ctx,w,h};
}

function drawBarChart(canvas, labels, values, color, title){
  const m=fitCanvas(canvas); if(!m) return;
  const {ctx,w,h}=m;
  const pad={l:40,r:10,t:20,b:34};
  const plotW=w-pad.l-pad.r, plotH=h-pad.t-pad.b;
  const max=Math.max(1, ...values.map(v=>Number(v||0)));
  const n=Math.max(1, values.length);
  const bw=Math.max(6, Math.min(36, plotW/(n*1.6)));
  ctx.fillStyle='#1a4f5a'; ctx.font='12px Segoe UI'; if(title) ctx.fillText(title, pad.l, 14);
  values.forEach((v,i)=>{
    const x=pad.l + (i+0.5)*plotW/n - bw/2;
    const y=pad.t + plotH - (Number(v||0)/max)*plotH;
    const hh=pad.t+plotH-y;
    ctx.fillStyle=Array.isArray(color)?(color[i]||'#2d8bba'):color;
    ctx.fillRect(x,y,bw,hh);
  });
}

function drawGroupedBars(canvas, labels, series){
  const m=fitCanvas(canvas); if(!m) return;
  const {ctx,w,h}=m;
  const pad={l:42,r:10,t:20,b:34};
  const plotW=w-pad.l-pad.r, plotH=h-pad.t-pad.b;
  let max=1;
  series.forEach(s=>s.values.forEach(v=>{ max=Math.max(max, Number(v||0)); }));
  const n=Math.max(1, labels.length), g=Math.max(1, series.length);
  const groupW=plotW/n, bw=Math.max(4, Math.min(14, groupW/(g+1)));
  series.forEach((s,si)=>{
    s.values.forEach((v,i)=>{
      const x=pad.l + i*groupW + 4 + si*bw;
      const y=pad.t + plotH - (Number(v||0)/max)*plotH;
      ctx.fillStyle=s.color; ctx.fillRect(x,y,bw,pad.t+plotH-y);
    });
  });
}

function drawLineChart(canvas, labels, series){
  const m=fitCanvas(canvas); if(!m) return;
  const {ctx,w,h}=m;
  const pad={l:40,r:10,t:14,b:26};
  const plotW=w-pad.l-pad.r, plotH=h-pad.t-pad.b;
  let max=1;
  series.forEach(s=>s.values.forEach(v=>{ if(v!=null) max=Math.max(max, Number(v||0)); }));
  const n=Math.max(2, labels.length);
  series.forEach(s=>{
    ctx.strokeStyle=s.color; ctx.lineWidth=2; ctx.beginPath();
    let started=false;
    s.values.forEach((v,i)=>{
      if(v==null) return;
      const x=pad.l + i*plotW/(n-1);
      const y=pad.t + plotH - (Number(v||0)/max)*plotH;
      if(!started){ ctx.moveTo(x,y); started=true; } else ctx.lineTo(x,y);
    });
    ctx.stroke();
  });
}

function buildDashboardAnalytics(out, model){
  const rows=(model && model.rows) || [];

      ins:Number(r.in_until||0),
      outs:Number(r.out_until||0),

function ensureSelectedSheetItem(model){
  const rows=(model && model.rows) || [];
  if(!rows.length){ state.selectedSheetItem=''; return; }
  const exists=rows.some(r=>String(r.item_code)===String(state.selectedSheetItem||''));
  if(exists) return;
  const critical=[...rows].sort((a,b)=>
    Number(a.coverage_days||99999)-Number(b.coverage_days||99999) ||
    Number(a.cutoff_balance||0)-Number(b.cutoff_balance||0)
  )[0];
  state.selectedSheetItem=String((critical && critical.item_code) || rows[0].item_code || '');
  localStorage.setItem('kardex_selected_item', state.selectedSheetItem);
}

function getSelectedItemModel(out, model){
  const rows=(model && model.rows) || [];
  const selected=rows.find(r=>String(r.item_code)===String(state.selectedSheetItem||'')) || rows[0];
  if(!selected) return null;
  const days=(out && out.days) || [];
  const mm=(out && out.month_movements) || [];
  const dayIn={};
  const dayOut={};
  mm.forEach(m=>{
    if(String(m.item_code)!==String(selected.item_code)) return;
    const d=Number(m.day||0);
    if(!d) return;
    const q=Number(m.quantity||0);
    const t=String(m.move_type||'').toUpperCase();
    if(t==='IN') dayIn[d]=(dayIn[d]||0)+q;
    if(t==='OUT') dayOut[d]=(dayOut[d]||0)+q;
  });
  const inSeries=days.map(d=>Number(dayIn[Number(d)]||0));
  const outSeries=days.map(d=>Number(dayOut[Number(d)]||0));
  return {
    row: selected,
    labels: days.map(d=>String(d)),
    stockSeries: (selected.day_values||[]).map(v=>Number(v||0)),
    inSeries,
    outSeries
  };
}

function semaforoLevel(v, rojo, amarillo){
  const n=Number(v||0);
  if(n<=rojo) return 'red';
  if(n<=amarillo) return 'yellow';
  return 'green';
}

function semaforoLabel(level){
  if(level==='red') return 'Rojo';
  if(level==='yellow') return 'Amarillo';
  return 'Verde';
}

function calcKpis(out, model){
  const rows=(model && model.rows) || [];
  let totalInicio=0;
  let stockCorte=0;
  let criticos=0;
  rows.forEach(r=>{
    totalInicio += Number(r.start_balance||0);
    stockCorte += Number(r.cutoff_balance||0);
    if(Number(r.cutoff_balance||0) <= 0) criticos++;
  });
  const cutoffDay = Number((model && model.cutoffDay) || 1);
  const monthDays = Number((model && model.monthDays) || cutoffDay);
  const consumoAcum = Number((model && model.totalOutUntil) || 0);
  const runRate = cutoffDay>0 ? consumoAcum / cutoffDay : 0;
  const consumoProyectado = runRate * monthDays;
  const stockProyectado = stockCorte - runRate * Math.max(0, monthDays-cutoffDay);
  const coberturaCritica = rows.filter(r=>r.coverage_level==='red').length;
  return {
    items: rows.length,
    inicio: totalInicio,
    corte: stockCorte,
    criticos,
    variacion: stockCorte-totalInicio,
    consumoAcum,
    runRate,
    consumoProyectado,
    stockProyectado,
    coberturaCritica
  };
}

function renderSemaforo(model){
  const rojo=Number(state.semaforo.rojo||0);
  const amarillo=Number(state.semaforo.amarillo||0);
  const rows=((model && model.rows) || []).map(r=>{
    const cut=Number(r.cutoff_balance||0);
    const start=Number(r.start_balance||0);
    const diff=Number(r.cutoff_diff||0);
    const level=semaforoLevel(cut,rojo,amarillo);
    return { code:r.item_code, name:r.item_name, cut, start, diff, level };
  });

  const order={'red':0,'yellow':1,'green':2};
  rows.sort((a,b)=> order[a.level]-order[b.level] || a.cut-b.cut || String(a.code).localeCompare(String(b.code)));

  const countRed=rows.filter(r=>r.level==='red').length;
  const countYellow=rows.filter(r=>r.level==='yellow').length;
  const countGreen=rows.filter(r=>r.level==='green').length;
  const avgEnd=rows.length ? rows.reduce((a,r)=>a+r.cut,0)/rows.length : 0;

  document.getElementById('semKpis').innerHTML=`
    <div class="traffic red">Rojo: ${countRed}</div>
    <div class="traffic yellow">Amarillo: ${countYellow}</div>
    <div class="traffic green">Verde: ${countGreen}</div>`;

function renderSemaforoArea(model){
  const y=Number(state.semaforoArea.amarillo||0);
  const r=Number(state.semaforoArea.rojo||0);
  const rows=((model && model.serviceRows) || []).map(s=>{
    const outq=Number(s.out_qty||0);
    let level='green';
    if(outq>=r) level='red'; else if(outq>=y) level='yellow';
    return {service:s.service_name,out_qty:outq,level};
  }).sort((a,b)=>({'red':0,'yellow':1,'green':2}[a.level]-({'red':0,'yellow':1,'green':2}[b.level]) || b.out_qty-a.out_qty));

  const cr=rows.filter(x=>x.level==='red').length;
  const cy=rows.filter(x=>x.level==='yellow').length;
  const cg=rows.filter(x=>x.level==='green').length;
  const kpis=document.getElementById('semAreaKpis');

  kpis.innerHTML=`

}

function renderManagerPanel(out, model, k){

  document.getElementById('managerKpis').innerHTML=`
    <div class="manager-kpi"><p class="label">Stock total al corte</p><p class="value">${fmt(k.corte)}</p></div>
    <div class="manager-kpi"><p class="label">Consumo acumulado</p><p class="value">${fmt(k.consumoAcum)}</p></div>
    <div class="manager-kpi"><p class="label">Ritmo diario (run-rate)</p><p class="value">${fmt(Math.round(k.runRate))}</p></div>

  const criticalCodes=rows

  document.getElementById('managerAlerts').innerHTML=`

    ${criticalCodes.length?`<span class="insight-chip alert">Prioridad compra: ${criticalCodes.join(', ')}</span>`:''}`;

  const order={ red:0, yellow:1, green:2 };
  const tableRows=[...rows].sort((a,b)=>{

  document.getElementById('managerTable').innerHTML=`
    <table>
      <thead>

            <td><strong>${esc(r.item_code)}</strong></td>
            <td>${esc(r.item_name)}</td>
            <td>${fmt(r.cutoff_balance)}</td>
            <td>${fmt(r.out_until)}</td>
            <td>${fmt(Math.round(r.daily_out_rate||0))}</td>
            <td>${r.coverage_days==null?'Sin consumo':`${fmt(Math.max(0,Math.round(r.coverage_days)))} dias`}</td>
            <td><span class="badge ${r.coverage_level}">${esc(r.coverage_text)}</span></td>
          </tr>`).join('')}
      </tbody>
    </table>`;

function invalidateDashboardClientCache(){
  state.dashboardMonthCache={};

  state.dashboard=null;
  state.dashboardTableKey='';
  state.trackingCache={};
  state.trackingRaw=null;
}

async function loadDashboard(force){
  try{
    const monthInput=document.getElementById('month');
    let selectedMonth=String(monthInput.value||'');
    state.dashboardMonth=selectedMonth;
    localStorage.setItem('kardex_dash_month', selectedMonth);

    let out=null;
    if(!force && state.dashboardMonthCache[selectedMonth]){
      out=state.dashboardMonthCache[selectedMonth];
    }else{
      out=await safeServer('getDashboard',{token:state.token,month:selectedMonth});
      state.dashboardMonthCache[selectedMonth]=out;
    }

    const hasRows=(out && out.month_movements && out.month_movements.length>0);
    if(!hasRows){
      const latestMonth=findLatestMonthWithData(out && out.recent);
      if(latestMonth && latestMonth!==selectedMonth){
        if(!force && state.dashboardMonthCache[latestMonth]){
          out=state.dashboardMonthCache[latestMonth];
        }else{
          out=await safeServer('getDashboard',{token:state.token,month:latestMonth});
          state.dashboardMonthCache[latestMonth]=out;
        }
        monthInput.value=latestMonth;
        const prevMonth=selectedMonth;
        selectedMonth=latestMonth;
        state.dashboardMonth=latestMonth;
        localStorage.setItem('kardex_dash_month', latestMonth);
        showMsg(`No hay movimientos en ${prevMonth}. Se cargó automáticamente ${latestMonth}.`, true);
      }
    }
    state.dashboardRaw=out;
    state.dashboard=out;
    syncCutoffSelector(out.days||[]);
    const validItems=new Set((out.rows||[]).map(r=>String(r.item_code)));
    if(state.selectedItems){
      const kept=new Set([...state.selectedItems].filter(x=>validItems.has(x)));
      state.selectedItems = kept.size ? kept : null;
    }
    renderDashboardPanels();
    updateHeaderMonth(state.dashboardMonth);
  }catch(e){ showMsg(e); }
}

function getDashboardDetailKey(out){
  if(!out) return '';
  const month=String(out.month||'');
  const rows=(out.rows||[]).length;
  const days=(out.days||[]).length;
  const filterCount=state.selectedItems ? state.selectedItems.size : 0;
  return `${month}|${rows}|${days}|${filterCount}`;
}

function renderDashboardDetailTable(out){
  const holder=document.getElementById('dashTable');
  const hint=document.getElementById('dashTableHint');
  const details=document.getElementById('dashDetails');
  if(!holder || !details || !details.open || !out) return;

  const key=getDashboardDetailKey(out);
  if(state.dashboardTableKey===key && holder.innerHTML.trim()) return;

  const head=['<th>Item</th><th>Descripcion</th><th>Inicio</th>'];
  (out.days||[]).forEach(d=>head.push(`<th>${d}</th>`));
  head.push('<th>Final</th>');

  const rows=(out.rows||[]).map(r=>{
    const t=[
      `<td><strong>${esc(r.item_code)}</strong></td>`,
      `<td>${esc(r.item_name)}</td>`,
      `<td>${fmt(r.start_balance)}</td>`
    ];
    (r.day_values||[]).forEach(v=>t.push(`<td>${fmt(v)}</td>`));
    t.push(`<td><strong>${fmt(r.end_balance)}</strong></td>`);
    return `<tr>${t.join('')}</tr>`;
  }).join('');

  holder.innerHTML=`<table><thead><tr>${head.join('')}</tr></thead><tbody>${rows}</tbody></table>`;
  state.dashboardTableKey=key;
  if(hint) hint.textContent='Detalle generado para el filtro y fecha de corte actuales.';
}

function renderDashboardPanels(){
  const out=getFilteredDashboardOut(state.dashboardRaw);
  if(!out) return;
  state.dashboard=out;
  const model=buildCutoffModel(out);
  ensureSelectedSheetItem(model);
  if(!(model.rows||[]).length){
    document.getElementById('insights').innerHTML=`<span class="insight-chip alert">No hay items en el filtro actual. Quite el filtro lasso para ver el tablero completo.</span>`;
    const dashTable=document.getElementById('dashTable');
    if(dashTable) dashTable.innerHTML='';
    state.dashboardTableKey='';
    destroyDashboardCharts();
    return;
  }

  const k=calcKpis(out, model);
    document.getElementById('kpi').innerHTML=`
      <div class="kpi emph"><p class="k-label">Items activos</p><p class="k-value">${k.items}</p></div>
      <div class="kpi"><p class="k-label">Saldo total inicio</p><p class="k-value">${fmt(k.inicio)}</p></div>
      <div class="kpi"><p class="k-label">Saldo total al corte</p><p class="k-value">${fmt(k.corte)}</p></div>
      <div class="kpi"><p class="k-label">Items en cero al corte</p><p class="k-value">${k.criticos}</p></div>
      <div class="kpi"><p class="k-label">Variacion al corte</p><p class="k-value">${fmt(k.variacion)}</p></div>`;

    const trendClass = k.variacion>=0 ? 'good' : 'alert';
    const trendText = k.variacion>=0 ? 'El stock acumulado mejora al corte' : 'El stock acumulado cae al corte';
    document.getElementById('insights').innerHTML=`
      <span class="insight-chip ${trendClass}">${trendText}</span>
      <span class="insight-chip">Fecha corte activa: ${model.cutoffLabel}</span>
      <span class="insight-chip">Consumo acumulado: ${fmt(k.consumoAcum)}</span>
      <span class="insight-chip">Run-rate diario: ${fmt(Math.round(k.runRate))}</span>
      <span class="insight-chip">Ficha activa: ${esc(state.selectedSheetItem || '-')}</span>`;
  renderItemSheet(out, model);
  requestAnimationFrame(()=>renderDashboardCharts(out, model));
  renderManagerPanel(out, model, k);
  renderSemaforo(model);
  renderSemaforoArea(model);
  renderDashboardDetailTable(out);
}

  function colorFromItemCode(code){
    const PALETTE=[
      {border:'#d83a74', bgSoft:'#feeff5', bgMid:'#fdd8e8', bgStrong:'#fbc1dc'}, // rosa
      {border:'#1f9d5a', bgSoft:'#eafaf1', bgMid:'#cff3df', bgStrong:'#b3ebcd'}, // verde
      {border:'#1f78d1', bgSoft:'#ebf4ff', bgMid:'#d1e6ff', bgStrong:'#b6d7ff'}, // azul
      {border:'#f06a2a', bgSoft:'#fff3eb', bgMid:'#ffe0cd', bgStrong:'#ffceb0'}, // naranja
      {border:'#7c4dff', bgSoft:'#f3efff', bgMid:'#e2d8ff', bgStrong:'#d1c0ff'}, // violeta
      {border:'#009f9d', bgSoft:'#e8fbfb', bgMid:'#c8f3f2', bgStrong:'#a9eceb'}, // turquesa
      {border:'#cc2f52', bgSoft:'#feeff2', bgMid:'#fcd4de', bgStrong:'#f9bacb'}, // frambuesa
      {border:'#4f9a06', bgSoft:'#f2fae9', bgMid:'#e1f2cc', bgStrong:'#cfe9ae'}, // lima
      {border:'#0067c8', bgSoft:'#eaf2ff', bgMid:'#cfe0ff', bgStrong:'#b2ceff'}, // azul fuerte
      {border:'#e07a00', bgSoft:'#fff6ea', bgMid:'#ffe6c4', bgStrong:'#ffd69e'}, // ambar
      {border:'#a83ee6', bgSoft:'#f7efff', bgMid:'#ebd5ff', bgStrong:'#debcff'}, // morado
      {border:'#00a86b', bgSoft:'#e8fbf3', bgMid:'#caf3df', bgStrong:'#acecca'}, // esmeralda
      {border:'#db3f8d', bgSoft:'#feeff7', bgMid:'#fdd6ea', bgStrong:'#fbbddc'}, // fucsia
      {border:'#2d8bba', bgSoft:'#edf7fc', bgMid:'#d4eefa', bgStrong:'#bbe5f8'}, // celeste
      {border:'#ff5b3a', bgSoft:'#fff1ed', bgMid:'#ffd9d0', bgStrong:'#ffc0b4'}, // coral
      {border:'#2aa84a', bgSoft:'#ecfaef', bgMid:'#d3f3dc', bgStrong:'#b9ecc8'}  // verde hoja
    ];
    const s=String(code||'');
    let h=0;
    for(let i=0;i<s.length;i++) h=(h*131 + s.charCodeAt(i)) >>> 0;
    const base=PALETTE[h % PALETTE.length];
    return {
      border:base.border,
      bgSoft:base.bgSoft,
      bgMid:base.bgMid,
      bgStrong:base.bgStrong

    refillSelect(serviceSelect, filtered.length?filtered:allServiceOptions);
  });

  [...document.querySelectorAll('.quick-qty')].forEach(b=>{
    b.onclick=()=>{
      const add=Number(b.getAttribute('data-v')||0);
      const qty=document.getElementById('m_qty');
      qty.value=String((Number(qty.value||0)+add)||add);
      qty.focus();
    };
  });

  document.getElementById('saveMove').onclick=async()=>{
    try{
      const payload={
        token:state.token,
        movement_date:document.getElementById('m_date').value,
        item_code:document.getElementById('m_item').value,
        service_name:document.getElementById('m_service').value,
        move_type:state.movementType,
        quantity:Number(document.getElementById('m_qty').value||0),
        ticket_no:document.getElementById('m_ticket').value,
        notes:document.getElementById('m_notes').value
      };

      if(!payload.movement_date){ showMsg('Seleccione la fecha.'); return; }
      if(!payload.item_code){ showMsg('Seleccione un item.'); return; }
      if(!payload.service_name){ showMsg('Seleccione un proveedor/area.'); return; }
      if(!payload.quantity || payload.quantity<=0){ showMsg('Ingrese una cantidad valida.'); return; }

      await safeServer('createMovement',payload);
      invalidateDashboardClientCache();
      state.closureCache={};
      showMsg('Movimiento guardado correctamente.',true);

      document.getElementById('m_qty').value='';
      document.getElementById('m_ticket').value='';
      document.getElementById('m_notes').value='';
      document.getElementById('m_qty').focus();
    }catch(e){ showMsg(e); }
  };
  adaptProviderForType();
}

      <div><label>Codigo</label><input id="i_code" type="text"/></div>

function fmt(v){
  const n=Number(v||0);
  return Number.isFinite(n) ? n.toLocaleString('es-PY') : String(v||'');
}

function esc(v){
  return String(v==null?'':v).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));
}
function escAttr(v){ return esc(v); }

// Global tooltip for item panel (works inside overflow containers)
(function setupGlobalTooltip(){
  const tt=document.createElement('div');
  tt.id='globalItemTooltip';
  document.body.appendChild(tt);
  document.addEventListener('mouseover',e=>{
    const btn=e.target.closest('[data-tooltip]');
    if(!btn){ tt.style.display='none'; return; }
    tt.textContent=btn.getAttribute('data-tooltip')||'';
    tt.style.display='block';
    tt.style.left=(e.clientX+14)+'px';
    tt.style.top=(e.clientY-10)+'px';
  });
  document.addEventListener('mouseout',e=>{
    if(!e.target.closest('[data-tooltip]')) tt.style.display='none';
  });
  document.addEventListener('mousemove',e=>{
    if(tt.style.display==='block'){
      tt.style.left=(e.clientX+14)+'px';
      tt.style.top=(e.clientY-10)+'px';
    }
  });
})();

(async function init(){
  if(!state.token){ renderLogin(); return; }
  try{
    await loadBootstrap();
    render();
  }catch(_e){
    localStorage.removeItem('kardex_token');
    state.token='';
    renderLogin();
  }
})();
</script>
