<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Kardex Enfermeria</title>
  <style>
    :root {
      --bg: #f3f8f9;
      --bg-2: #e8f1f4;
      --card: #ffffff;
      --line: #d6e2e6;
      --text: #0f2127;
      --muted: #4d666e;
      --brand: #0b5f6d;
      --brand-2: #147a8c;
      --ok: #0c6a39;
      --err: #992a2a;
      --warn: #7d5a00;
      --entry: #0a7a55;
      --exit: #a23a1d;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      font-family: "Segoe UI", Tahoma, sans-serif;
      background:
        radial-gradient(circle at 10% 0%, #f6fbfc 0%, transparent 34%),
        linear-gradient(145deg, var(--bg) 0%, var(--bg-2) 100%);
    }

    .top {
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid #1d6a78;
      background: linear-gradient(120deg, #0a4852 0%, #0e5a67 70%, #137184 100%);
      color: #fff;
      padding: 14px 16px 12px;
      box-shadow: 0 4px 16px rgba(9, 52, 60, 0.25);
    }

    .top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .title {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .subtitle {
      margin: 4px 0 0;
      opacity: 0.93;
      font-size: 0.87rem;
    }

    .user-pill {
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 999px;
      font-size: 0.84rem;
      padding: 6px 10px;
      white-space: nowrap;
    }

    .menu {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .menu button {
      border: 1px solid rgba(255, 255, 255, 0.35);
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      border-radius: 999px;
      padding: 9px 14px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
    }

    .menu button.active { background: #fff; color: #0b5661; }
    .menu button:hover { filter: brightness(1.08); }

    main {
      max-width: 1320px;
      margin: 0 auto;
      padding: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 14px;
      box-shadow: 0 6px 16px rgba(14, 60, 70, 0.06);
    }

    .narrow { max-width: 460px; margin: 28px auto; }

    h2 {
      margin: 0 0 10px;
      font-size: 1.18rem;
      line-height: 1.2;
    }

    .help {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .steps {
      display: grid;
      grid-template-columns: repeat(3, minmax(180px, 1fr));
      gap: 10px;
      margin-bottom: 8px;
    }

    .step {
      border: 1px dashed #bad0d7;
      border-radius: 10px;
      background: #f7fcfd;
      padding: 8px 10px;
      font-size: 0.88rem;
      color: #33525c;
    }

    .step b { color: #124a57; }

    label {
      display: block;
      margin-top: 10px;
      font-weight: 700;
      font-size: 0.91rem;
    }

    input, select, textarea, button {
      width: 100%;
      margin-top: 4px;
      border: 1px solid #c8d9de;
      border-radius: 10px;
      padding: 11px 12px;
      font-size: 0.95rem;
      background: #fff;
      color: var(--text);
    }

    textarea { min-height: 84px; resize: vertical; }

    button {
      border: none;
      background: var(--brand);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      transition: transform .05s ease, filter .15s ease;
    }

    button:hover { filter: brightness(1.06); }
    button:active { transform: translateY(1px); }

    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn-row button { width: auto; }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(130px, 1fr));
      gap: 10px;
      margin-bottom: 10px;
    }

    .kpi {
      border: 1px solid #cee0e5;
      border-radius: 12px;
      background: linear-gradient(150deg, #ffffff 0%, #f4fafb 100%);
      padding: 10px;
    }

    .kpi .k-label { color: #4a6670; font-size: 0.82rem; margin: 0; }
    .kpi .k-value { font-size: 1.2rem; margin: 4px 0 0; font-weight: 800; color: #0f4d59; }
    .kpi.emph {
      background: linear-gradient(135deg, #0f6473 0%, #17859a 100%);
      color: #fff;
      border: none;
    }
    .kpi.emph .k-label { color: rgba(255,255,255,0.86); }
    .kpi.emph .k-value { color: #fff; }

    .insights {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 8px 0 12px;
    }
    .insight-chip {
      border: 1px solid #c8dde3;
      background: #f4fafc;
      color: #2d5460;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.82rem;
      font-weight: 700;
    }
    .insight-chip.alert {
      border-color: #efbeb0;
      background: #fff1ec;
      color: #8d351f;
    }
    .insight-chip.good {
      border-color: #b8dec6;
      background: #ebf8f0;
      color: #0d6b3c;
    }

    .analytics-grid {
      margin-top: 10px;
      display: grid;
      grid-template-columns: repeat(2, minmax(280px, 1fr));
      gap: 10px;
    }
    .chart-card {
      border: 1px solid #d1e2e7;
      border-radius: 12px;
      padding: 10px;
      background: linear-gradient(160deg, #ffffff 0%, #f6fbfd 100%);
      min-height: 290px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.6);
    }
    .chart-title {
      margin: 0 0 8px;
      font-size: 0.92rem;
      color: #174f5b;
      font-weight: 800;
      letter-spacing: .2px;
    }
    .chart-wrap {
      position: relative;
      height: 240px;
    }
    .semaforo-box {
      margin-top: 12px;
      border: 1px solid #d2e2e7;
      border-radius: 12px;
      padding: 10px;
      background: linear-gradient(160deg,#ffffff 0%,#f7fbfd 100%);
    }
    .semaforo-head {
      display: flex;
      gap: 10px;
      align-items: end;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .semaforo-head .field { min-width: 140px; }
    .semaforo-head input { max-width: 130px; }
    .semaforo-kpis {
      display: grid;
      grid-template-columns: repeat(3, minmax(120px, 1fr));
      gap: 8px;
      margin: 8px 0 10px;
    }
    .traffic {
      border-radius: 10px;
      padding: 8px 10px;
      border: 1px solid transparent;
      font-weight: 800;
      font-size: 0.9rem;
    }
    .traffic.red { background: #ffeceb; border-color: #f2b6b0; color: #9e2f28; }
    .traffic.yellow { background: #fff9e8; border-color: #f3df9e; color: #7f610b; }
    .traffic.green { background: #ecf8ef; border-color: #bee1c7; color: #1d6f3e; }
    .semaforo-pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .pill {
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.8rem;
      font-weight: 700;
      border: 1px solid #cddfe5;
      background: #f8fcfd;
      color: #335861;
    }
    .badge {
      display: inline-block;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 800;
      padding: 3px 8px;
      border: 1px solid transparent;
    }
    .badge.red { background:#ffeceb; color:#9e2f28; border-color:#efb9b3; }
    .badge.yellow { background:#fff9e8; color:#7f610b; border-color:#efdca0; }
    .badge.green { background:#ecf8ef; color:#1d6f3e; border-color:#bfdcc8; }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 1fr));
      gap: 12px;
      align-items: start;
    }

    .grid button.save {
      grid-column: 1 / -1;
      max-width: 280px;
      font-size: 1rem;
      padding: 12px;
    }

    .move-type {
      display: grid;
      grid-template-columns: repeat(2, minmax(160px, 1fr));
      gap: 10px;
      margin-top: 6px;
    }

    .type-btn {
      border-radius: 12px;
      border: 1px solid #c8d9de;
      padding: 12px;
      font-size: 0.94rem;
      background: #fff;
      color: #184a55;
      font-weight: 700;
    }

    .type-btn.active.entry { background: #eaf8f2; border-color: #9fd3bc; color: var(--entry); }
    .type-btn.active.exit { background: #fff1ec; border-color: #efbeac; color: var(--exit); }

    .note {
      border-left: 4px solid #97bac5;
      background: #f5fafb;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 0.88rem;
      color: #385864;
      margin-top: 10px;
    }

    .table {
      overflow: auto;
      border: 1px solid #d5e3e8;
      border-radius: 10px;
      background: #fff;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 0.88rem;
    }

    th, td {
      border: 1px solid #dfebef;
      padding: 7px 8px;
      white-space: nowrap;
      text-align: left;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #ecf6f8;
      color: #114652;
      font-size: 0.83rem;
    }

    td strong { color: #083d47; }

    .chip {
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 0.78rem;
      font-weight: 700;
      display: inline-block;
    }

    .chip.in { background: #e8f8ef; color: #0d6f3d; border: 1px solid #b4dfc4; }
    .chip.out { background: #fff0ea; color: #963b22; border: 1px solid #f0c6b8; }

    .msg {
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 10px;
      font-weight: 700;
      font-size: 0.92rem;
    }

    .msg.ok { background: #e7f8ed; color: var(--ok); border: 1px solid #c2e7ce; }
    .msg.err { background: #ffeded; color: var(--err); border: 1px solid #f0c2c2; }
    .hidden { display: none; }

    .loader {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(7, 35, 41, 0.28);
      z-index: 99;
      backdrop-filter: blur(2px);
    }

    .loader-card {
      background: #fff;
      border: 1px solid #cfdfe4;
      border-radius: 12px;
      padding: 14px 18px;
      font-weight: 700;
      color: #0f4c57;
      box-shadow: 0 10px 25px rgba(7, 35, 41, 0.2);
    }

    .small { font-size: 0.83rem; color: var(--muted); }

    @media (max-width: 980px) {
      .grid { grid-template-columns: 1fr; }
      .move-type { grid-template-columns: 1fr; }
      .summary { grid-template-columns: repeat(2, minmax(130px, 1fr)); }
      .steps { grid-template-columns: 1fr; }
      .analytics-grid { grid-template-columns: 1fr; }
      main { padding: 12px; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body>
  <header class="top">
    <div class="top-row">
      <div>
        <h1 class="title">Kardex de Esterilizacion</h1>
        <p class="subtitle">Registro diario de insumos para enfermeria</p>
      </div>
      <div id="userLabel" class="user-pill"></div>
    </div>
    <nav id="menu" class="menu hidden"></nav>
  </header>

  <main id="app"></main>

  <div id="loader" class="loader">
    <div class="loader-card">Cargando, por favor espere...</div>
  </div>

<script>
const state = {
  token: localStorage.getItem('kardex_token') || '',
  user: null,
  bootstrap: null,
  dashboard: null,
  currentView: 'dashboard',
  movementType: 'OUT',
  charts: [],
  semaforo: {
    rojo: Number(localStorage.getItem('kardex_sem_rojo') || 50),
    amarillo: Number(localStorage.getItem('kardex_sem_amarillo') || 150)
  }
};

const VIEW_LABELS = {
  dashboard: 'Tablero',
  movements: 'Registrar movimiento',
  items: 'Catalogo de items',
  services: 'Catalogo de servicios',
  audit: 'Auditoria'
};

function setLoading(on) {
  document.getElementById('loader').style.display = on ? 'flex' : 'none';
}

function showMsg(text, ok=false){
  const el=document.createElement('div');
  el.className='msg '+(ok?'ok':'err');
  el.textContent=text;
  const app=document.getElementById('app');
  app.prepend(el);
  setTimeout(()=>el.remove(),6500);
}

function runServer(fn, payload){
  return new Promise((resolve,reject)=>{
    google.script.run
      .withSuccessHandler(resolve)
      .withFailureHandler(err=>reject(err && err.message ? err.message : String(err)))
      [fn](payload);
  });
}

async function safeServer(fn, payload){
  setLoading(true);
  try { return await runServer(fn, payload); }
  finally { setLoading(false); }
}

function roleName(role){
  if(role==='admin') return 'Administracion';
  if(role==='operator') return 'Operador/a';
  return 'Consulta';
}

function render(){
  if(!state.token){ renderLogin(); return; }
  renderShell();
  if(state.currentView==='dashboard') renderDashboard();
  if(state.currentView==='movements') renderMovements();
  if(state.currentView==='items') renderItems();
  if(state.currentView==='services') renderServices();
  if(state.currentView==='audit') renderAudit();
}

function renderLogin(){
  document.getElementById('menu').classList.add('hidden');
  document.getElementById('userLabel').textContent='No autenticado';

  const app=document.getElementById('app');
  app.innerHTML=`
    <section class="card narrow">
      <h2>Bienvenida/o</h2>
      <p class="help">Ingrese su usuario y contrasena para comenzar.</p>
      <label>Usuario</label>
      <input id="u" type="text" autocomplete="username" placeholder="Ejemplo: user"/>

      <label>Contrasena</label>
      <input id="p" type="password" autocomplete="current-password" placeholder="Ingrese su contrasena"/>

      <div class="btn-row" style="margin-top:12px">
        <button id="b">Entrar al sistema</button>
      </div>
      <p class="small">Version <?= appVersion ?></p>
    </section>`;

  document.getElementById('u').focus();
  document.getElementById('p').addEventListener('keydown', (e)=>{ if(e.key==='Enter') document.getElementById('b').click(); });

  document.getElementById('b').onclick=async()=>{
    try{
      const username=document.getElementById('u').value.trim();
      const password=document.getElementById('p').value;
      if(!username || !password){ showMsg('Complete usuario y contrasena.'); return; }

      const out=await safeServer('login',{username,password});
      state.token=out.token;
      localStorage.setItem('kardex_token',state.token);
      state.user=out.user;
      await loadBootstrap();
      state.currentView='dashboard';
      render();
      showMsg('Ingreso correcto. Bienvenida/o.', true);
    }catch(e){ showMsg(e); }
  };
}

async function loadBootstrap(){
  const out=await safeServer('getBootstrap',state.token);
  state.bootstrap=out;
  state.user=out.user;
}

function renderShell(){
  document.getElementById('userLabel').textContent = state.user ? `${state.user.username} · ${roleName(state.user.role)}` : '';

  const menu=document.getElementById('menu');
  menu.classList.remove('hidden');
  menu.innerHTML='';

  const canWrite=state.user && (state.user.role==='admin' || state.user.role==='operator');
  const isAdmin=state.user && state.user.role==='admin';

  addMenuBtn(menu,'Tablero','dashboard',()=>{state.currentView='dashboard';render();});
  if(canWrite) addMenuBtn(menu,'Registrar','movements',()=>{state.currentView='movements';render();});
  if(isAdmin){
    addMenuBtn(menu,'Items','items',()=>{state.currentView='items';render();});
    addMenuBtn(menu,'Servicios','services',()=>{state.currentView='services';render();});
    addMenuBtn(menu,'Auditoria','audit',()=>{state.currentView='audit';render();});
    addMenuBtn(menu,'Inicializar','init',async()=>{
      try{
        await safeServer('initSchema',{token:state.token});
        showMsg('Hojas inicializadas correctamente.',true);
        await loadBootstrap();
      }catch(e){ showMsg(e); }
    });
  }

  addMenuBtn(menu,'Salir','logout',async()=>{
    try{ await safeServer('logout',state.token); }catch(_e){}
    localStorage.removeItem('kardex_token');
    state.token=''; state.user=null; state.bootstrap=null;
    renderLogin();
  });
}

function addMenuBtn(menu,label,view,cb){
  const b=document.createElement('button');
  b.textContent=label;
  if(state.currentView===view) b.classList.add('active');
  b.onclick=cb;
  b.style.width='auto';
  menu.appendChild(b);
}

async function renderDashboard(){
  const app=document.getElementById('app');
  const monthDefault=new Date().toISOString().slice(0,7);

  app.innerHTML=`
    <section class="card">
      <h2>${VIEW_LABELS.dashboard}</h2>
      <p class="help">Aqui puede ver el saldo diario por item. Seleccione el mes para consultar.</p>

      <div class="summary" id="kpi"></div>
      <div class="insights" id="insights"></div>

      <div class="inline">
        <div>
          <label>Mes</label>
          <input id="month" type="month" value="${monthDefault}"/>
        </div>
        <button id="loadBtn">Actualizar tablero</button>
      </div>

      <div class="analytics-grid" id="analyticsGrid">
        <div class="chart-card">
          <p class="chart-title">Distribucion del stock final por item</p>
          <div class="chart-wrap"><canvas id="chartPie"></canvas></div>
        </div>
        <div class="chart-card">
          <p class="chart-title">Items con menor stock final</p>
          <div class="chart-wrap"><canvas id="chartLow"></canvas></div>
        </div>
        <div class="chart-card">
          <p class="chart-title">Serie temporal: stock total del mes</p>
          <div class="chart-wrap"><canvas id="chartSeries"></canvas></div>
        </div>
        <div class="chart-card">
          <p class="chart-title">Variacion mensual por item (final - inicio)</p>
          <div class="chart-wrap"><canvas id="chartVar"></canvas></div>
        </div>
      </div>

      <div class="semaforo-box">
        <h3 style="margin:0 0 8px;color:#184d59;font-size:1rem">Semaforo clinico de reposicion</h3>
        <p class="help" style="margin-bottom:8px">Clasifica cada item por stock final para priorizar reposicion (rojo primero).</p>
        <div class="semaforo-head">
          <div class="field">
            <label style="margin-top:0">Umbral rojo (critico)</label>
            <input id="semRojo" type="number" min="0" step="1" />
          </div>
          <div class="field">
            <label style="margin-top:0">Umbral amarillo (alerta)</label>
            <input id="semAmarillo" type="number" min="0" step="1" />
          </div>
          <button id="semApply" style="width:auto">Aplicar semaforo</button>
          <button id="semReset" style="width:auto;background:#5b7480">Restablecer</button>
        </div>
        <div id="semKpis" class="semaforo-kpis"></div>
        <div id="semPills" class="semaforo-pills"></div>
        <div id="semTable" class="table"></div>
      </div>

      <div id="dashTable" class="table" style="margin-top:12px"></div>
    </section>`;

  document.getElementById('semRojo').value = state.semaforo.rojo;
  document.getElementById('semAmarillo').value = state.semaforo.amarillo;
  document.getElementById('semApply').onclick=()=>{
    const rojo=Math.max(0,Number(document.getElementById('semRojo').value||0));
    const amarillo=Math.max(0,Number(document.getElementById('semAmarillo').value||0));
    if(amarillo<rojo){ showMsg('El umbral amarillo debe ser mayor o igual al rojo.'); return; }
    state.semaforo.rojo=rojo;
    state.semaforo.amarillo=amarillo;
    localStorage.setItem('kardex_sem_rojo',String(rojo));
    localStorage.setItem('kardex_sem_amarillo',String(amarillo));
    if(state.dashboard) renderSemaforo(state.dashboard);
  };
  document.getElementById('semReset').onclick=()=>{
    state.semaforo={rojo:50, amarillo:150};
    document.getElementById('semRojo').value=50;
    document.getElementById('semAmarillo').value=150;
    localStorage.setItem('kardex_sem_rojo','50');
    localStorage.setItem('kardex_sem_amarillo','150');
    if(state.dashboard) renderSemaforo(state.dashboard);
  };

  document.getElementById('loadBtn').onclick=async()=>{ await loadDashboard(); };
  await loadDashboard();
}

function calcKpis(out){
  let totalFinal=0;
  let totalInicio=0;
  let bajo=0;
  out.rows.forEach(r=>{
    totalFinal += Number(r.end_balance||0);
    totalInicio += Number(r.start_balance||0);
    if(Number(r.end_balance||0) <= 0) bajo++;
  });
  return {
    items: out.rows.length,
    inicio: totalInicio,
    final: totalFinal,
    criticos: bajo,
    variacion: totalFinal-totalInicio
  };
}

function destroyDashboardCharts(){
  if(!state.charts) state.charts=[];
  state.charts.forEach(ch=>{ try{ ch.destroy(); }catch(_e){} });
  state.charts=[];
}

function colorRamp(i){
  const palette=['#0b5f6d','#1d8091','#2c9bb0','#62b8c8','#97d3dc','#f39a6b','#e66f51','#c44a3f','#7fb069','#4f8f5f','#8b7bd1','#aa8bd7'];
  return palette[i%palette.length];
}

function buildDashboardAnalytics(out){
  const rows=out.rows||[];
  const days=out.days||[];
  const totalByDay=days.map((_,idx)=> rows.reduce((acc,r)=>acc+Number(r.day_values?.[idx]||0),0));
  const low=[...rows].sort((a,b)=>Number(a.end_balance||0)-Number(b.end_balance||0)).slice(0,10);
  const varRows=[...rows].map(r=>({
    code:r.item_code,
    diff:Number(r.end_balance||0)-Number(r.start_balance||0)
  })).sort((a,b)=>a.diff-b.diff);
  const pieBase=[...rows].sort((a,b)=>Number(b.end_balance||0)-Number(a.end_balance||0));
  const topPie=pieBase.slice(0,8);
  const others=pieBase.slice(8).reduce((a,r)=>a+Number(r.end_balance||0),0);
  const pieLabels=topPie.map(r=>r.item_code);
  const pieValues=topPie.map(r=>Number(r.end_balance||0));
  if(others>0){ pieLabels.push('OTROS'); pieValues.push(others); }
  return {totalByDay,low,varRows,pieLabels,pieValues};
}

function renderDashboardCharts(out){
  destroyDashboardCharts();
  if(typeof Chart==='undefined') return;

  const a=buildDashboardAnalytics(out);
  const days=(out.days||[]).map(d=>String(d));

  const pieCtx=document.getElementById('chartPie');
  const lowCtx=document.getElementById('chartLow');
  const seriesCtx=document.getElementById('chartSeries');
  const varCtx=document.getElementById('chartVar');
  if(!pieCtx||!lowCtx||!seriesCtx||!varCtx) return;

  state.charts.push(new Chart(pieCtx,{
    type:'pie',
    data:{
      labels:a.pieLabels,
      datasets:[{ data:a.pieValues, backgroundColor:a.pieValues.map((_,i)=>colorRamp(i)), borderWidth:1 }]
    },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'bottom' } } }
  }));

  state.charts.push(new Chart(lowCtx,{
    type:'bar',
    data:{
      labels:a.low.map(r=>r.item_code),
      datasets:[{
        label:'Stock final',
        data:a.low.map(r=>Number(r.end_balance||0)),
        backgroundColor:a.low.map((_,i)=> i<3 ? '#e66f51' : '#2c9bb0')
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ display:false } },
      scales:{ x:{ ticks:{ maxRotation:0,minRotation:0 } }, y:{ beginAtZero:true } }
    }
  }));

  state.charts.push(new Chart(seriesCtx,{
    type:'line',
    data:{
      labels:days,
      datasets:[{
        label:'Stock total diario',
        data:a.totalByDay,
        fill:true,
        borderColor:'#0b5f6d',
        backgroundColor:'rgba(11,95,109,0.16)',
        tension:.25,
        pointRadius:2
      }]
    },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display:false } } }
  }));

  const varLabels=a.varRows.map(r=>r.code);
  const varData=a.varRows.map(r=>r.diff);
  state.charts.push(new Chart(varCtx,{
    type:'bar',
    data:{
      labels:varLabels,
      datasets:[{
        label:'Variacion',
        data:varData,
        backgroundColor:varData.map(v=>v>=0 ? '#2f9e70' : '#d9654b')
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ display:false } },
      scales:{ x:{ ticks:{ maxRotation:0,minRotation:0, autoSkip:true } }, y:{ beginAtZero:true } }
    }
  }));
}

function semaforoLevel(v, rojo, amarillo){
  const n=Number(v||0);
  if(n<=rojo) return 'red';
  if(n<=amarillo) return 'yellow';
  return 'green';
}

function semaforoLabel(level){
  if(level==='red') return 'Rojo';
  if(level==='yellow') return 'Amarillo';
  return 'Verde';
}

function renderSemaforo(out){
  const rojo=Number(state.semaforo.rojo||0);
  const amarillo=Number(state.semaforo.amarillo||0);
  const rows=(out.rows||[]).map(r=>{
    const end=Number(r.end_balance||0);
    const start=Number(r.start_balance||0);
    const diff=end-start;
    const level=semaforoLevel(end,rojo,amarillo);
    return { code:r.item_code, name:r.item_name, end, start, diff, level };
  });

  const order={'red':0,'yellow':1,'green':2};
  rows.sort((a,b)=> order[a.level]-order[b.level] || a.end-b.end || String(a.code).localeCompare(String(b.code)));

  const countRed=rows.filter(r=>r.level==='red').length;
  const countYellow=rows.filter(r=>r.level==='yellow').length;
  const countGreen=rows.filter(r=>r.level==='green').length;
  const avgEnd=rows.length ? rows.reduce((a,r)=>a+r.end,0)/rows.length : 0;

  document.getElementById('semKpis').innerHTML=`
    <div class="traffic red">Rojo: ${countRed}</div>
    <div class="traffic yellow">Amarillo: ${countYellow}</div>
    <div class="traffic green">Verde: ${countGreen}</div>`;

  const criticalTop=rows.filter(r=>r.level==='red').slice(0,5).map(r=>`${r.code} (${fmt(r.end)})`);
  document.getElementById('semPills').innerHTML=`
    <span class="pill">Umbrales: rojo ≤ ${fmt(rojo)} | amarillo ≤ ${fmt(amarillo)}</span>
    <span class="pill">Stock final promedio: ${fmt(Math.round(avgEnd))}</span>
    ${criticalTop.length?`<span class="pill" style="border-color:#efb9b3;background:#ffeceb;color:#902f27">Criticos: ${criticalTop.join(', ')}</span>`:''}`;

  document.getElementById('semTable').innerHTML=`
    <table>
      <thead>
        <tr>
          <th>Prioridad</th>
          <th>Item</th>
          <th>Descripcion</th>
          <th>Saldo final</th>
          <th>Variacion mes</th>
          <th>Estado</th>
        </tr>
      </thead>
      <tbody>
        ${rows.map((r,i)=>`
          <tr>
            <td>${i+1}</td>
            <td><strong>${esc(r.code)}</strong></td>
            <td>${esc(r.name)}</td>
            <td>${fmt(r.end)}</td>
            <td>${fmt(r.diff)}</td>
            <td><span class="badge ${r.level}">${semaforoLabel(r.level)}</span></td>
          </tr>`).join('')}
      </tbody>
    </table>`;
}

async function loadDashboard(){
  try{
    const month=document.getElementById('month').value;
    const out=await safeServer('getDashboard',{token:state.token,month});
    state.dashboard=out;

    const k=calcKpis(out);
    document.getElementById('kpi').innerHTML=`
      <div class="kpi emph"><p class="k-label">Items activos</p><p class="k-value">${k.items}</p></div>
      <div class="kpi"><p class="k-label">Saldo total inicio</p><p class="k-value">${fmt(k.inicio)}</p></div>
      <div class="kpi"><p class="k-label">Saldo total final</p><p class="k-value">${fmt(k.final)}</p></div>
      <div class="kpi"><p class="k-label">Items en cero</p><p class="k-value">${k.criticos}</p></div>
      <div class="kpi"><p class="k-label">Variacion del mes</p><p class="k-value">${fmt(k.variacion)}</p></div>`;

    const trendClass = k.variacion>=0 ? 'good' : 'alert';
    const trendText = k.variacion>=0 ? 'El stock total subio este mes' : 'El stock total bajo este mes';
    document.getElementById('insights').innerHTML=`
      <span class="insight-chip ${trendClass}">${trendText}</span>
      <span class="insight-chip">Top criticidad: ${k.criticos} item(s) en cero</span>
      <span class="insight-chip">Periodo analizado: ${out.month}</span>`;

    const head=['<th>Item</th><th>Descripcion</th><th>Inicio</th>'];
    out.days.forEach(d=>head.push(`<th>${d}</th>`));
    head.push('<th>Final</th>');

    const rows=out.rows.map(r=>{
      const t=[
        `<td><strong>${esc(r.item_code)}</strong></td>`,
        `<td>${esc(r.item_name)}</td>`,
        `<td>${fmt(r.start_balance)}</td>`
      ];
      r.day_values.forEach(v=>t.push(`<td>${fmt(v)}</td>`));
      t.push(`<td><strong>${fmt(r.end_balance)}</strong></td>`);
      return `<tr>${t.join('')}</tr>`;
    }).join('');

    document.getElementById('dashTable').innerHTML=`<table><thead><tr>${head.join('')}</tr></thead><tbody>${rows}</tbody></table>`;
    renderDashboardCharts(out);
    renderSemaforo(out);
  }catch(e){ showMsg(e); }
}

function renderMovements(){
  const app=document.getElementById('app');
  const items=(state.bootstrap && state.bootstrap.items)||[];
  const services=(state.bootstrap && state.bootstrap.services)||[];
  const today = new Date().toISOString().slice(0,10);

  app.innerHTML=`
  <section class="card">
    <h2>${VIEW_LABELS.movements}</h2>
    <p class="help">Complete los datos y confirme. El registro se guarda de forma inmediata en la planilla.</p>

    <div class="steps">
      <div class="step"><b>Paso 1:</b> Seleccione si es entrada o salida.</div>
      <div class="step"><b>Paso 2:</b> Cargue fecha, item, servicio y cantidad.</div>
      <div class="step"><b>Paso 3:</b> Presione <b>Guardar movimiento</b>.</div>
    </div>

    <label>Tipo de movimiento</label>
    <div class="move-type">
      <button id="btnOut" class="type-btn exit active">Salida de insumo</button>
      <button id="btnIn" class="type-btn entry">Entrada de insumo</button>
    </div>

    <div class="note" id="moveHelp">Salida: descuenta unidades del stock.</div>

    <div class="grid">
      <div>
        <label>Fecha</label>
        <input id="m_date" type="date" value="${today}"/>
      </div>
      <div>
        <label>Item</label>
        <select id="m_item">${items.map(i=>`<option value="${escAttr(i.item_code)}">${esc(i.item_code)} - ${esc(i.item_name)}</option>`).join('')}</select>
      </div>
      <div>
        <label>Servicio</label>
        <select id="m_service">${services.map(s=>`<option value="${escAttr(s.service_name)}">${esc(s.service_name)}</option>`).join('')}</select>
      </div>
      <div>
        <label>Cantidad</label>
        <input id="m_qty" type="number" min="1" placeholder="Ejemplo: 10"/>
      </div>
      <div>
        <label>Nro. boleta / ticket (opcional)</label>
        <input id="m_ticket" type="text" placeholder="Ejemplo: 1234"/>
      </div>
      <div>
        <label>Nota (opcional)</label>
        <textarea id="m_notes" placeholder="Observaciones"></textarea>
      </div>
      <button id="saveMove" class="save">Guardar movimiento</button>
    </div>
  </section>`;

  function setType(t){
    state.movementType=t;
    const outBtn=document.getElementById('btnOut');
    const inBtn=document.getElementById('btnIn');
    outBtn.classList.remove('active'); inBtn.classList.remove('active');
    if(t==='OUT') outBtn.classList.add('active');
    if(t==='IN') inBtn.classList.add('active');
    document.getElementById('moveHelp').textContent = t==='OUT'
      ? 'Salida: descuenta unidades del stock.'
      : 'Entrada: suma unidades al stock.';
  }

  document.getElementById('btnOut').onclick=()=>setType('OUT');
  document.getElementById('btnIn').onclick=()=>setType('IN');

  document.getElementById('saveMove').onclick=async()=>{
    try{
      const payload={
        token:state.token,
        movement_date:document.getElementById('m_date').value,
        item_code:document.getElementById('m_item').value,
        service_name:document.getElementById('m_service').value,
        move_type:state.movementType,
        quantity:Number(document.getElementById('m_qty').value||0),
        ticket_no:document.getElementById('m_ticket').value,
        notes:document.getElementById('m_notes').value
      };

      if(!payload.movement_date){ showMsg('Seleccione la fecha.'); return; }
      if(!payload.item_code){ showMsg('Seleccione un item.'); return; }
      if(!payload.service_name){ showMsg('Seleccione un servicio.'); return; }
      if(!payload.quantity || payload.quantity<=0){ showMsg('Ingrese una cantidad valida.'); return; }

      await safeServer('createMovement',payload);
      showMsg('Movimiento guardado correctamente.',true);

      document.getElementById('m_qty').value='';
      document.getElementById('m_ticket').value='';
      document.getElementById('m_notes').value='';
      document.getElementById('m_qty').focus();
    }catch(e){ showMsg(e); }
  };
}

  const app=document.getElementById('app');

    <section class="card">
      <h2>${VIEW_LABELS.audit}</h2>
      <p class="help">Uso administrativo. Registro de acciones del sistema.</p>
      <div id="a_tbl" class="table"></div>

  try{
    const logs=await safeServer('getAudit',{token:state.token});

      <table>

        <tbody>${logs.map(l=>`<tr><td>${esc(l.created_at)}</td><td>${esc(l.username)}</td><td>${esc(l.action)}</td><td>${esc(l.entity)}</td><td>${esc(l.entity_id)}</td><td>${esc(l.details)}</td></tr>`).join('')}</tbody>
      </table>`;

}

function fmt(v){
  const n=Number(v||0);
  return Number.isFinite(n) ? n.toLocaleString('es-PY') : String(v||'');
}

function esc(v){
  return String(v==null?'':v).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));
}
function escAttr(v){ return esc(v); }

(async function init(){
  if(!state.token){ renderLogin(); return; }
  try{
    await loadBootstrap();
    render();
  }catch(_e){
    localStorage.removeItem('kardex_token');
    state.token='';
    renderLogin();
  }
})();
</script>
